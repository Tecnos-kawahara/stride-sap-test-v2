# BABOK Technique Library — Tecnos-STRIDE Upstream Extension (Phase A)
#
# BABOK v3 §10 の 50 技法を Tecnos-STRIDE Upstream の選択カタログとして登録する。
# 各技法には独自の 1 行 purpose と、典型的に使われる Phase / artifact を紐付ける。
# 原典テキストの長文転記は行わない (fair-use, names + section refs only)。
#
# Phase A: 静的カタログのみ。AI による技法自動推薦 (technique_picker) は Phase B。

version: "0.1.0-phase-a"
status: "draft"
source: "BABOK v3 §10 Techniques (50 techniques)"

attributions:
  - { source: "BABOK v3 (IIBA)", role: "technique catalogue (§10.1〜10.50)", license: "fair-use, technique names and section refs only" }

