# 共通クラス・共通 Include 使用ルール定義
# 用途:
#   1. sap_checklist_suggest.py → spec.md の common_class_applicability に出力
#   2. sap_common_class_lint.py → ABAPソースの禁止パターン検出 + パラメータ突合
#   3. sap_quality_score.py → 共通クラス使用チェック
# 注意:
#   - forbidden_patterns はリスト形式。後から行追加するだけで禁止パターン拡張可能
#   - 共通クラス自身のソース（classes[].name に該当するファイル）はlint対象外
#   - methods[].parameters で定義されたパラメータのみ使用可能（未定義パラメータはlintエラー）
#   - methods[].description はメソッドの説明（Excel「共通クラスオブジェクト(詳細)」シート由来）
#   - common_include_rules: 選択画面の共通 Include プログラム。INCLUDE 文で取り込む

common_class_rules:
  - id: "CC-FILE-01"
    trigger_pattern: "ファイル|file|CSV|TSV|Excel|固定長|アップロード|ダウンロード"
    forbidden_patterns:
      - "CL_GUI_FRONTEND_SERVICES=>GUI_UPLOAD"
      - "CL_GUI_FRONTEND_SERVICES=>GUI_DOWNLOAD"
      - "CL_GUI_FRONTEND_SERVICES=>FILE_OPEN_DIALOG"
      - "CL_GUI_FRONTEND_SERVICES=>DIRECTORY_BROWSE"
      - "CL_GUI_FRONTEND_SERVICES=>FILE_SAVE_DIALOG"
      - "OPEN DATASET"
      - "CLOSE DATASET"
      - "TRANSFER"
      - "READ DATASET"
    classes:
      - name: ZCL_CMA_LOCAL_FILE
        condition: "ローカルファイル"
        description: "ローカルファイル入出力"
        methods:
          - name: F4HELP_PATH_IN
            description: "ローカルファイル入力パスのF4ヘルプ"
            parameters:
              - { name: iv_prompt, direction: IMPORTING, type: "STRING", optional: true }
              - { name: cv_file_path, direction: CHANGING, type: "STRING" }
          - name: F4HELP_PATH_OUT
            description: "ローカルファイル出力パスのF4ヘルプ"
            parameters:
              - { name: iv_prompt, direction: IMPORTING, type: "STRING", optional: true }
              - { name: cv_file_path, direction: CHANGING, type: "STRING" }
          - name: F4HELP_DIRECTORY
            description: "ディレクトリのF4ヘルプ"
            parameters:
              - { name: iv_prompt, direction: IMPORTING, type: "STRING", optional: true }
              - { name: cv_directory, direction: CHANGING, type: "STRING" }
          - name: INPUT_TSV
            description: "ローカルTSVファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: rt_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_CSV
            description: "ローカルCSVファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_FIX
            description: "ローカル固定長ファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: it_layout, direction: IMPORTING, type: "TY_LAYOUT", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_EXCEL
            description: "ローカルExcelファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: iv_sheet, direction: IMPORTING, type: "STRING", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_TSV
            description: "ローカルTSVファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_CSV
            description: "ローカルCSVファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_FIX
            description: "ローカル固定長ファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: it_layout, direction: IMPORTING, type: "TY_LAYOUT", optional: true }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_EXCEL
            description: "ローカルExcelファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "STRING" }
              - { name: iv_sheet, direction: IMPORTING, type: "STRING", default: "'Sheet1'" }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: GET_LAYOUT
            description: "構造名からレイアウト(フィールド幅)取得"
            parameters:
              - { name: iv_structure, direction: IMPORTING, type: "DD02L-TABNAME" }
              - { name: rt_layout, direction: RETURNING, type: "TY_LAYOUT" }
      - name: ZCL_CMA_AP_FILE
        condition: "サーバーファイル"
        description: "サーバーファイル入出力"
        methods:
          - name: INPUT_TSV
            description: "サーバーTSVファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_CSV
            description: "サーバーCSVファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_FIX
            description: "サーバー固定長ファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: it_layout, direction: IMPORTING, type: "TY_LAYOUT", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: INPUT_EXCEL
            description: "サーバーExcelファイル読込"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_sheet, direction: IMPORTING, type: "STRING", optional: true }
              - { name: ct_file_data, direction: CHANGING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_TSV
            description: "サーバーTSVファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_CSV
            description: "サーバーCSVファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_FIX
            description: "サーバー固定長ファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
              - { name: iv_encord, direction: IMPORTING, type: "CHAR4", optional: true }
              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: it_layout, direction: IMPORTING, type: "TY_LAYOUT", optional: true }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: OUTPUT_EXCEL
            description: "サーバーExcelファイル出力"
            parameters:
              - { name: iv_path, direction: IMPORTING, type: "PATHINTERN" }
              - { name: iv_file, direction: IMPORTING, type: "FILEINTERN" }
