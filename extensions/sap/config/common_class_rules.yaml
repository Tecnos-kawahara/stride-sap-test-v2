              - { name: it_data, direction: IMPORTING, type: "TY_ROWS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: GET_LAYOUT
            description: "構造名からレイアウト(フィールド幅)取得"
