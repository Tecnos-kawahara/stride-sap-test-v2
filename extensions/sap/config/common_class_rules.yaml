  - id: "CC-AUTH-01"
    trigger_pattern: "権限|AUTHORITY|会社コード|プラント|販売エリア|購買組織"
    forbidden_patterns:
      - "AUTHORITY-CHECK"
    classes:
      - name: ZCL_CMA_COMMON_CHECK
        description: "権限・存在チェック"
        methods:
          - name: AUTH_COMPANY
            description: "会社コード権限チェック"
            parameters:
              - { name: iv_bukrs, direction: IMPORTING, type: "BUKRS" }
              - { name: iv_activity, direction: IMPORTING, type: "CHAR2" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: AUTH_SALESAREA
            description: "販売エリア権限チェック"
            parameters:
              - { name: iv_salesorg, direction: IMPORTING, type: "VKORG" }
              - { name: iv_salesdist, direction: IMPORTING, type: "VTWEG" }
              - { name: iv_salesspart, direction: IMPORTING, type: "SPART" }
              - { name: iv_activity, direction: IMPORTING, type: "CHAR2" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: AUTH_PUR_ORG
            description: "購買組織権限チェック"
            parameters:
              - { name: iv_porg, direction: IMPORTING, type: "EKORG" }
              - { name: iv_activity, direction: IMPORTING, type: "CHAR2" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: AUTH_PLANT
            description: "プラント権限チェック"
            parameters:
              - { name: iv_plant, direction: IMPORTING, type: "WERKS_D" }
              - { name: iv_activity, direction: IMPORTING, type: "CHAR2" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: EXIST_COMPANY
            description: "会社コード存在チェック"
            parameters:
              - { name: iv_bukrs, direction: IMPORTING, type: "BUKRS" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: EXIST_SALESAREA
            description: "販売エリア存在チェック"
            parameters:
              - { name: iv_salesorg, direction: IMPORTING, type: "VKORG" }
              - { name: iv_salesdist, direction: IMPORTING, type: "VTWEG" }
              - { name: iv_salesspart, direction: IMPORTING, type: "SPART" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: EXIST_PUR_ORG
            description: "購買組織存在チェック"
            parameters:
              - { name: iv_porg, direction: IMPORTING, type: "EKORG" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: EXIST_PLANT
            description: "プラント存在チェック"
            parameters:
              - { name: iv_plant, direction: IMPORTING, type: "WERKS_D" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }

  - id: "CC-ALV-01"
    trigger_pattern: "ALV|一覧表示|一覧出力"
    forbidden_patterns:
      - "REUSE_ALV_GRID_DISPLAY"
      - "REUSE_ALV_LIST_DISPLAY"
      - "CL_SALV_TABLE"
      - "CL_GUI_ALV_GRID"
    classes:
      - name: ZCL_CMA_ALV_GENERIC
        description: "ALV汎用出力"
        methods:
          - name: CONSTRUCTOR
            description: "コンストラクタ（データ参照でSALV生成）"
            parameters:
              - { name: i_data, direction: IMPORTING, type: "REF TO DATA" }
          - name: SET_COLUMNS
            description: "列設定一括適用"
            parameters:
              - { name: it_columns, direction: IMPORTING, type: "TY_COLUMN_SETTINGS" }
          - name: SET_COLUMN_TEXT
            description: "列テキスト設定"
            parameters:
              - { name: i_fieldname, direction: IMPORTING, type: "LVC_FNAME" }
              - { name: i_short_text, direction: IMPORTING, type: "SCRTEXT_S", optional: true }
              - { name: i_medium_text, direction: IMPORTING, type: "SCRTEXT_M", optional: true }
              - { name: i_long_text, direction: IMPORTING, type: "SCRTEXT_L", optional: true }
          - name: SET_HOTSPOT
            description: "列をホットスポット設定"
            parameters:
              - { name: i_fieldname, direction: IMPORTING, type: "LVC_FNAME" }
          - name: HIDE_COLUMN
            description: "列を非表示設定"
            parameters:
              - { name: i_fieldname, direction: IMPORTING, type: "LVC_FNAME" }
          - name: SET_OPTIMIZE
            description: "列幅自動最適化"
            parameters: []
          - name: SET_ZEBRA
            description: "縞模様表示設定"
            parameters: []
          - name: REGISTER_HANDLER
            description: "リンククリックハンドラ登録"
            parameters:
              - { name: i_callback, direction: IMPORTING, type: "REF TO ZIF_CMA_ALV_CALLBACK", optional: true }
          - name: DISPLAY
            description: "ALV表示"
            parameters: []
          - name: GET_SALV
            description: "SALVオブジェクト取得"
            parameters:
              - { name: r_salv, direction: RETURNING, type: "REF TO CL_SALV_TABLE" }
          - name: F4HELP_VARIANT
            description: "レイアウトバリアントF4ヘルプ"
            parameters:
              - { name: iv_report, direction: IMPORTING, type: "SY-REPID", optional: true }
              - { name: cv_variant, direction: CHANGING, type: "SLIS_VARI" }
      - name: ZCL_CMA_ALV_HANDLER
        description: "ALVイベントハンドラ"
        methods:
          - name: CONSTRUCTOR
            description: "コンストラクタ（コールバック設定）"
            parameters:
              - { name: i_callback, direction: IMPORTING, type: "REF TO ZIF_CMA_ALV_CALLBACK", optional: true }
          - name: ON_LINK_CLICK
            description: "リンククリックイベントハンドラ"
            parameters:
              - { name: row, direction: IMPORTING, type: "(EVENT)" }
              - { name: column, direction: IMPORTING, type: "(EVENT)" }
      - name: ZIF_CMA_ALV_CALLBACK
        description: "ALVコールバックインターフェイス"
        methods:
          - name: ON_HOTSPOT_CLICK
            description: "ホットスポットクリックイベント"
            parameters:
              - { name: i_row, direction: IMPORTING, type: "I" }
              - { name: i_column, direction: IMPORTING, type: "LVC_FNAME" }

  - id: "CC-LOG-01"
    trigger_pattern: "アプリケーションログ|SLG1|ログ出力|ログ記録"
    forbidden_patterns:
      - "BAL_LOG_CREATE"
      - "BAL_LOG_MSG_ADD"
      - "BAL_DB_SAVE"
    classes:
      - name: ZCL_CMA_APPLOG
        description: "アプリケーションログ"
        methods:
          - name: LOG_CREATE
            description: "ログオブジェクト作成"
            parameters:
              - { name: iv_object, direction: IMPORTING, type: "CHAR20" }
              - { name: iv_subobject, direction: IMPORTING, type: "CHAR20" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: ADD_MESSAGE
            description: "ログメッセージ追加"
            parameters:
              - { name: is_bapiret2, direction: IMPORTING, type: "BAPIRET2" }
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }
          - name: SAVE_LOG
            description: "ログDB保存"
            parameters:
              - { name: rv_result, direction: RETURNING, type: "BAPIRET2" }

  - id: "CC-JOBRESULT-01"
    trigger_pattern: "処理結果|JOB.?RESULT|成功件数|エラー件数|処理サマリ"
    forbidden_patterns: []
    classes:
      - name: ZCL_CMA_JOB_RESULT
        description: "ジョブ結果メッセージ"
        methods:
          - name: JOB_RESULT
            description: "ジョブ結果メッセージ出力"
            parameters:
              - { name: iv_err, direction: IMPORTING, type: "ABAP_BOOL" }

  # --- T100 メッセージクラス使用強制 ---
  - id: "CC-MSG-01"
    trigger_pattern: "メッセージ|MESSAGE|エラー通知|警告|通知"
    forbidden_patterns:
      - "MESSAGE '"
    classes: []

