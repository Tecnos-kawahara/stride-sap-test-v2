# =============================================
# 共通 Include プログラム（選択画面共通部品）
# =============================================
# 選択画面に組織項目やファイルパス項目を配置する場合、
# 共通 Include を INCLUDE 文で取り込むこと。
# 各 Include が提供する PARAMETERS / SELECT-OPTIONS は命名規約に準拠済み。
#
# 用途:
#   1. sap_checklist_suggest.py → spec.md の common_include_applicability に出力
#   2. sap_common_class_lint.py → ABAP ソースに INCLUDE 文があるか検証（将来拡張）
#
# trigger_pattern: AC/selection_screen の記述にマッチした場合に適用候補として提示
# provides: Include が提供する選択画面項目の概要

common_include_rules:
  - id: "CI-ORG-01"
    name: "ZCMAI000101"
    description: "会社コード共通画面(単一)"
    trigger_pattern: "会社コード|BUKRS|company.?code"
    provides: "P_BUKRS (会社コード PARAMETERS)"

  - id: "CI-ORG-02"
    name: "ZCMAI000102"
    description: "販売エリア共通画面(単一)"
    trigger_pattern: "販売エリア|販売組織|流通チャネル|製品部門|VKORG|VTWEG|SPART|sales.?area"
    provides: "P_VKORG, P_VTWEG, P_SPART (販売エリア PARAMETERS)"

  - id: "CI-ORG-03"
    name: "ZCMAI000103"
    description: "販売組織共通画面(単一)"
    trigger_pattern: "販売組織|VKORG|sales.?org"
    provides: "P_VKORG (販売組織 PARAMETERS)"

  - id: "CI-ORG-04"
    name: "ZCMAI000104"
    description: "購買組織共通画面(単一)"
    trigger_pattern: "購買組織|EKORG|purchasing.?org"
    provides: "P_EKORG (購買組織 PARAMETERS)"

  - id: "CI-ORG-05"
    name: "ZCMAI000105"
    description: "プラント共通画面(単一)"
    trigger_pattern: "プラント|WERKS|plant"
    provides: "P_WERKS (プラント PARAMETERS)"

  - id: "CI-ORG-06"
    name: "ZCMAI000106"
    description: "管理領域共通画面(単一)"
    trigger_pattern: "管理領域|KOKRS|controlling.?area"
    provides: "P_KOKRS (管理領域 PARAMETERS)"

  - id: "CI-FILE-01"
    name: "ZCMAI000107"
    description: "Localファイル共通画面"
    trigger_pattern: "ローカルファイル|local.?file|アップロード|ダウンロード|ファイルパス"
    provides: "P_FILE (ローカルファイルパス PARAMETERS)"

  - id: "CI-FILE-02"
    name: "ZCMAI000108"
    description: "Localファイル(エラー)共通画面"
    trigger_pattern: "エラーファイル|error.?file|エラーダウンロード"
    provides: "P_EFILE (エラーファイルパス PARAMETERS)"

  - id: "CI-FILE-03"
    name: "ZCMAI000109"
    description: "APファイル共通画面"
    trigger_pattern: "サーバーファイル|AP.?ファイル|server.?file"
    provides: "P_DPATH, P_DFILE (サーバーファイルパス・ファイル名 PARAMETERS)"

  - id: "CI-FILE-04"
    name: "ZCMAI000110"
    description: "APファイル(エラー)共通画面"
    trigger_pattern: "サーバーエラーファイル|AP.?エラー"
    provides: "P_EDPATH, P_EDFILE (サーバーエラーファイルパス・ファイル名 PARAMETERS)"

  - id: "CI-TEST-01"
    name: "ZCMAI000111"
    description: "テスト実行共通画面"
    trigger_pattern: "テスト実行|テストモード|test.?run|test.?mode"
    provides: "P_TEST (テスト実行フラグ PARAMETERS)"

  - id: "CI-ALV-01"
    name: "ZCMAI000112"
    description: "ALV共通画面"
    trigger_pattern: "ALV|バリアント|一覧表示|variant"
    provides: "P_VARI (ALV バリアント PARAMETERS)"
