# MANIFEST.yaml v2.0.0 — SAP Extension Pack
# STRIDE v6.0.0 拡張パック宣言。AI が自動検出し、SAP 固有のルール・テンプレート・ツールを適用する。
manifest_version: "2.0.0"

extension:
  name: "sap"
  version: "2.0.0"
  description: "SAP ERP 開発向け拡張パック。仕様書 yaml を SSoT とし、basic_design への機械転記、SAP 固有の検証・エビデンス収集を提供する"
  min_stride_version: "6.0.0"
  author: "Tecnos Japan"
  profile: "enterprise-erp"

# 検出条件: 3 つの戦略で SAP 拡張パックの有効化を判定
detection:
  strategies:
    - type: "plan_key"
      key: "architecture.sap_components"
      description: "plan.md に architecture.sap_components が存在する場合に SAP 拡張を検出"
    - type: "basic_design_key"
      key: "sap_context"
      description: "basic_design.md の #0 YAML canonical に sap_context セクションが存在する場合に検出"
    - type: "config_file"
      path: ".stride-extensions.yaml"
      key: "active_extensions"
      value: "sap"
      description: "明示的な拡張パック有効化設定"

# scaffold（機能ディレクトリ初期化時にコピーされるテンプレート）
scaffold:
  files_dir: "scaffold"
  inject:
    - source: "config/"
      target: ".stride/config/"
      description: "SAP 固有の設定ファイルをプロジェクトにコピー"
    - source: "templates/"
      target: ".stride/templates/sap/"
      description: "SAP テンプレートをプロジェクトにコピー"
    - source: ".stride-extensions.yaml"
      target: ".stride-extensions.yaml"
      merge: true
      description: "拡張パック設定を既存設定にマージ"
  files:
    - path: "scaffold/implementation-details/evidence_pack_sap.md"
    - path: "scaffold/implementation-details/sap_context.md"
    - path: "scaffold/ops/transport_manifest.yaml"
    - path: "scaffold/ops/release_checklist.md"
    - path: "scaffold/ops/rollback_plan.md"
    - path: "scaffold/ops/hypercare_runbook.md"
    - path: "scaffold/state/state.yaml"

# エビデンスパック拡張
evidence_pack:
  extension_file: "templates/evidence_pack_sap.md"
  required_sections:
    - "transport_evidence"
    - "authorization_test"
    - "sap_gui_screenshots"
    - "activation_log"
    - "unit_test_results"
    - "code_inspector_results"

# ツール（validators / mapping_refs / utilities / sap_operations の 4 層構造）
tools:
  # --- validators: stride_lint 経由で動的ロード ---
  validators:
    # 新規 7 件（C1〜C7）
    - name: "basic_design_completeness_validator"
      path: "tools/basic_design_completeness_validator.py"
      trigger: "phase:design,phase:specify"
      description: "C1: yaml→BD 展開検証 + L3-01: spec AC→traceability 逆方向チェック（specify 時）"
      severity: "error"
    - name: "catalogs_consistency_validator"
      path: "tools/catalogs_consistency_validator.py"
      trigger: "phase:design,phase:specify"
      description: "C2: CHK→MSG 紐付け + R9: message_class 整合性（specify 時に spec 参照）"
      severity: "error"
    - name: "glossary_ref_validator"
      path: "tools/glossary_ref_validator.py"
      trigger: "phase:specify"
      description: "C3: domain_terms_ref 参照先確認"
      severity: "error"
    - name: "sap_message_t100_validator"
      path: "tools/sap_message_t100_validator.py"
      trigger: "phase:sap_context"
      description: "C4: T100 メッセージ class/number 実在チェック"
      severity: "error"
    - name: "sap_ddic_gate_validator"
      path: "tools/sap_ddic_gate_validator.py"
      trigger: "phase:sap_context"
      description: "C5: data_references[].tables DDIC 実在チェック"
      severity: "error"
    - name: "sap_ac_granularity_validator"
      path: "tools/sap_ac_granularity_validator.py"
      trigger: "phase:specify"
      description: "C6: AC の catalog_refs カバレッジ + 独立性"
      severity: "error"
    - name: "plan_quality_validator"
      path: "tools/plan_quality_validator.py"
      trigger: "phase:specify,phase:execute"
      description: "C7: PQ-01〜PQ-15（test_matrix カバレッジ + SAP クロスファイル整合性）"
      severity: "error"
    - name: "sap_contracts_cross_validator"
      path: "tools/sap_contracts_cross_validator.py"
      trigger: "phase:specify"
      description: "C8: CX-01〜CX-05（contracts ↔ basic_design/spec クロスファイル整合性）"
      severity: "error"
    # 引き継ぎ 5 件
    - name: "sap_quality_score"
      path: "tools/sap_quality_score.py"
      trigger: "phase:execute"
      description: "SAP 総合品質スコアを算出（5カテゴリ + 14件の減点ルール QR-01〜14）"
      severity: "error"
    - name: "sap_common_class_lint"
      path: "tools/sap_common_class_lint.py"
      trigger: "phase:execute"
      description: "共通クラス使用ルール遵守を検証"
      severity: "warning"
    - name: "sap_program_type_validator"
      path: "tools/sap_program_type_validator.py"
      trigger: "phase:execute"
      description: "プログラム種別検証"
      severity: "error"
    - name: "sap_tool_evidence_validator"
      path: "tools/sap_tool_evidence_validator.py"
      trigger: "phase:final"
      description: "ツールエビデンス検証"
      severity: "error"
    - name: "sap_s_evidence_validator"
      path: "tools/sap_s_evidence_validator.py"
      trigger: "phase:final"
      description: "S エビデンス検証"
      severity: "error"
  # --- mapping_refs: AI が Phase 1 で参照する転記マッピング定義 ---
  mapping_refs:
    - name: "yaml_to_basic_design_mapping"
      path: "agent_docs/phase1_design.md"
      detail_ref: "詳細仕様/04_ツール個別設計.md §A-1"
      description: "仕様書 yaml → basic_design.md の転記マッピング定義（AI が参照して転記を実行）"
  # --- utilities: 分析・整形・生成の補助ツール ---
  utilities:
    - name: "sap_context_metadata"
      path: "tools/sap_context_metadata.py"
      trigger: "manual"
      description: "SAP コンテキストメタデータの収集"
    - name: "sap_branch_analyzer"
      path: "tools/sap_branch_analyzer.py"
      trigger: "manual"
      description: "分岐解析（spec-code alignment）"
    - name: "clean_abap"
      path: "tools/clean_abap.js"
      trigger: "phase:execute"
      description: "Clean ABAP ルールに基づくコード整形"
    - name: "sap_path_enumerator"
      path: "tools/sap_path_enumerator.py"
      trigger: "phase:specify"
      description: "process_definitions.body + tag_branch_rules.yaml からパス列挙（v6再設計版）"
    - name: "sap_scenario_generator"
      path: "tools/sap_scenario_generator.py"
      trigger: "phase:specify"
      description: "パス列挙結果からシナリオ候補を生成（提案用。SSoTではない）"
  # --- sap_operations: SAP GUI 操作ツール（authority レベル付き）---
  sap_operations:
    - name: "evidence_capture"
      path: "tools/evidence_capture.js"
      authority: "gated"
      description: "エビデンス一括取得"
    - name: "evidence_merge_report"
      path: "tools/evidence_merge_report.js"
      authority: "conversational"
      description: "エビデンス統合レポート生成"
    - name: "create_object"
      path: "tools/create_object.js"
      authority: "gated"
      description: "SAP オブジェクト作成"
    - name: "activate"
      path: "tools/activate.js"
      authority: "gated"
      description: "SAP オブジェクト有効化"
    - name: "pull"
      path: "tools/pull.js"
      authority: "gated"
      description: "SAP ソース取得"
    - name: "read"
      path: "tools/read.js"
      authority: "conversational"
      description: "SAP ソース参照"
    - name: "search"
      path: "tools/search.js"
      authority: "conversational"
      description: "SAP オブジェクト検索"
    - name: "data_preview"
      path: "tools/data_preview.js"
      authority: "conversational"
      description: "SE16 データプレビュー"
    - name: "run_tests"
      path: "tools/run_tests.js"
      authority: "gated"
      description: "ABAP Unit テスト実行"
    - name: "gui_test"
      path: "tools/gui_test.js"
      authority: "gated"
      description: "GUI テスト実行"
    - name: "update_description"
      path: "tools/update_description.js"
      authority: "gated"
      description: "オブジェクト説明テキスト更新"
    - name: "unlock"
      path: "tools/unlock.js"
      authority: "gated"
      description: "SAP オブジェクトロック解除（ADT API 経由）"
    - name: "gui_launch"
      path: "tools/gui_launch.js"
      authority: "gated"
      description: "SAP GUI 自動起動・ログイン"
    - name: "capture_window"
      path: "tools/capture_window.ps1"
      authority: "conversational"
      description: "ウィンドウキャプチャ（PowerShell, evidence_capture.js から呼出）"

# Phase 別ステップ定義（01_マップに基づく）
phase_steps:
  design:
    steps:
      - id: "1-A1"
        name: "yaml → basic_design.md 生成"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase1_design.md#step-1-a1"
        note: "AI がマッピングテーブル（04 §A-1）に従い構造化データを転記 + 自然言語セクションを構成"
      - id: "1-A2"
        name: "パターン分岐の identify + risk_flags 自動判定"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase1_design.md#step-1-a2"
      - id: "1-B1"
        name: "BPMN 生成"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase1_design.md#step-1-b1"
      - id: "1-C1"
        name: "yaml 全要素の展開確認"
        tool: "basic_design_completeness_validator"
        type: "validator"
      - id: "1-C2"
        name: "カタログ整合性"
        tool: "catalogs_consistency_validator"
        type: "validator"
      - id: "1-C3"
        name: "STRIDE 標準 lint"
        tool: "stride_lint"
        type: "validator"
  sap_context:
    steps:
      - id: "2P-A1"
        name: "SAP オブジェクト検索"
        tool: "search"
        type: "utility"
        doc_ref: "agent_docs/phase2_pre_sap_context.md#step-2p-a1"
      - id: "2P-A2"
        name: "SAP ソース参照"
        tool: "read"
        type: "utility"
        doc_ref: "agent_docs/phase2_pre_sap_context.md#step-2p-a2"
      - id: "2P-A3"
        name: "SAP ソース取得"
        tool: "pull"
        type: "utility"
        doc_ref: "agent_docs/phase2_pre_sap_context.md#step-2p-a3"
      - id: "2P-B1"
        name: "sap_context.md 記録"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase2_pre_sap_context.md#step-2p-b1"
      - id: "2P-B2"
        name: "テーブルメタデータ記録"
        tool: "sap_context_metadata"
        type: "utility"
      - id: "2P-C1"
        name: "T100 メッセージ検証"
        tool: "sap_message_t100_validator"
        type: "validator"
      - id: "2P-C2"
        name: "DDIC 存在検証"
        tool: "sap_ddic_gate_validator"
        type: "validator"
  specify:
    steps:
      - id: "2-A1"
        name: "spec.md 作成（AC に catalog_refs 設定）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase2_specify.md#ac-生成ルール"
      - id: "2-A2"
        name: "contracts 作成（SAP 固有テンプレート適用）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase2_specify.md#sap-固有-contracts-テンプレート"
      - id: "2-B1"
        name: "plan.md 作成（path_analysis セクション含む）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase2_specify.md#planpath_analysis-セクション"
      - id: "2-C1"
        name: "scenarios.yaml 作成（Type A + Type B の 2 系統）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase2_specify.md#シナリオ設計ルール"
      - id: "2-D1"
        name: "カタログ整合性"
        tool: "catalogs_consistency_validator"
        type: "validator"
      - id: "2-D2"
        name: "glossary 参照確認"
        tool: "glossary_ref_validator"
        type: "validator"
      - id: "2-D3"
        name: "AC 粒度検証"
        tool: "sap_ac_granularity_validator"
        type: "validator"
      - id: "2-D4"
        name: "plan 品質検証"
        tool: "plan_quality_validator"
        type: "validator"
  tasking:
    steps:
      - id: "3-A1"
        name: "tasks.md 作成（SAP 開発順序 + sap_objects + mode 自動判定）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase3_tasking.md#1-sap-開発順序"
  execute:
    steps:
      - id: "4-A1"
        name: "WI 単位実装（SAP 固有: create → pull → 実装 → activate）"
        tool: null
        type: "workflow"
        doc_ref: "agent_docs/phase4_execute.md#2-wi-16-step-フロー"
      - id: "4-B1"
        name: "ABAP Unit テスト"
        tool: "run_tests"
        type: "utility"
      - id: "4-B2"
        name: "Clean ABAP チェック"
        tool: "clean_abap"
        type: "utility"
      - id: "4-B3"
        name: "共通クラス利用チェック"
        tool: "sap_common_class_lint"
        type: "validator"
      - id: "4-B4"
        name: "品質スコア算出（≥ 85pt 必須）"
        tool: "sap_quality_score"
        type: "validator"
  final:
    steps:
      - id: "5-A1"
        name: "エビデンス収集"
        tool: "evidence_capture"
        type: "utility"
      - id: "5-A2"
        name: "エビデンスレポート統合"
        tool: "evidence_merge_report"
        type: "utility"
      - id: "5-B1"
        name: "品質スコア最終算出"
        tool: "sap_quality_score"
        type: "validator"
      - id: "5-B2"
        name: "ツールエビデンス検証"
        tool: "sap_tool_evidence_validator"
        type: "validator"
      - id: "5-B3"
        name: "S エビデンス検証"
        tool: "sap_s_evidence_validator"
        type: "validator"

# agent_docs（bootstrap + Phase 別オンデマンド + 補助文書）
agent_docs:
  # bootstrap（常時読み込み）
  - name: "CLAUDE_SAP"
    path: "CLAUDE_SAP.md"
    description: "SAP 拡張パック固有のルール・制約（Rule S1-S7）。AI が常時適用する行動制約"
    load_timing: "bootstrap"
  - name: "CLAUDE_WORKFLOW_SAP"
    path: "CLAUDE_WORKFLOW_SAP.md"
    description: "Phase 概要 + 品質基準 + ⛔参照テーブルのみ。手順の詳細は agent_docs/ に分離"
    load_timing: "bootstrap"
  # Phase 別オンデマンド読み込み（6 件）
  - name: "phase1_design"
    path: "agent_docs/phase1_design.md"
    description: "Phase 1 詳細: yaml→basic_design 転記, AI構成, パターン分岐検出, 検証"
    load_timing: "phase:design"
  - name: "phase2_pre_sap_context"
    path: "agent_docs/phase2_pre_sap_context.md"
    description: "Phase 2 前準備 詳細: SAP実機接続, sap_context記録, T100/DDIC検証（任意Phase）"
    load_timing: "phase:design"
  - name: "phase2_specify"
    path: "agent_docs/phase2_specify.md"
    description: "Phase 2 詳細: spec/plan/contracts生成, AC生成ルール(catalog_refs), テストシナリオ"
    load_timing: "phase:specify"
  - name: "phase3_tasking"
    path: "agent_docs/phase3_tasking.md"
    description: "Phase 3 詳細: SAP開発順序(DDIC→CDS→...→DDLX), BDD, mode判定"
    load_timing: "phase:tasking"
  - name: "phase4_execute"
    path: "agent_docs/phase4_execute.md"
    description: "Phase 4 詳細: WI 16-step SAP固有サイクル, ABAP品質, Stage 2-3"
    load_timing: "phase:execute"
  - name: "phase_final"
    path: "agent_docs/phase_final.md"
    description: "Final 詳細: evidence_pack完成, Ops Pack検証, pr-check"
    load_timing: "phase:final"
  # 補助文書（Phase 4 内で必要時に参照）（5 件）
  - name: "testing_sap"
    path: "agent_docs/testing_sap.md"
    description: "SAP テスト戦略ガイド"
    load_timing: "phase:execute"
  - name: "conventions_sap"
    path: "agent_docs/conventions_sap.md"
    description: "SAP 命名規約・コーディング規約"
    load_timing: "phase:execute"
  - name: "error_recovery_sap"
    path: "agent_docs/error_recovery_sap.md"
    description: "SAP エラーリカバリ手順"
    load_timing: "phase:execute"
  - name: "codegen_sap"
    path: "agent_docs/codegen_sap.md"
    description: "ABAP コード生成品質ルール（アンチパターン AP-01〜05、絶対禁止事項、セルフチェック）"
    load_timing: "phase:execute"
  - name: "gui_test_fail_analysis"
    path: "agent_docs/gui_test_fail_analysis.md"
    description: "GUI テスト FAIL 時の原因分析・リカバリ手順"
    load_timing: "phase:execute"

# テンプレート（完成版方式: SAP 拡張 ON 時に標準テンプレートを SAP 版で差し替え）
# stride init が .stride-extensions.yaml を検出すると、標準テンプレートの代わりにこちらをコピーする。
# AI は1ファイルだけ読めばよい（標準 + overlay の2ファイル読みは不要）。
templates:
  # substitutions: stride init が標準テンプレートを SAP 完成版で差し替える定義
  # target = 標準テンプレートのファイル名（拡張子なし）、source = SAP 完成版のパス
  substitutions:
    basic_design:
      source: "templates/basic_design_template.md"
      description: "SAP 完成版 basic_design（標準 + SAP セクション統合済み）"
    spec:
      source: "templates/spec_template.md"
      description: "SAP 完成版 spec（localization, domain_terms_ref, catalog_refs 統合済み）"
    plan:
      source: "templates/plan_template.md"
      description: "SAP 完成版 plan（sap_components, transport_strategy 統合済み）"
    tasks:
      source: "templates/tasks_template.md"
      description: "SAP 完成版 tasks（sap_objects, activation_order 統合済み）"
    evidence_pack:
      source: "templates/evidence_pack_sap.md"
      description: "SAP 完成版 evidence_pack（SAP 固有エビデンスセクション統合済み）"
    scenarios:
      source: "templates/tests/scenarios_template.yaml"
      description: "SAP 完成版 scenarios（Type A + Type B デュアルパステスト）"
  partial_templates:
    contracts:
      - source: "templates/contracts/ui_specifications_template.yaml"
        description: "SAP 画面仕様テンプレート"
      - source: "templates/contracts/file_specifications_template.yaml"
        description: "ファイル仕様テンプレート"
      - source: "templates/contracts/report_specifications_template.yaml"
        description: "帳票仕様テンプレート"
      - source: "templates/contracts/database_schema_template.yaml"
        description: "SAP データベーススキーマテンプレート"
      - source: "templates/contracts/authz_matrix_template.yaml"
        description: "権限マトリクステンプレート"
      - source: "templates/contracts/openapi_template.yaml"
        description: "API 仕様テンプレート"
    tests:
      - source: "templates/tests/scenarios_template.yaml"
        description: "テストシナリオテンプレート"
  # リファレンス文書（AI が Phase 4 で参照するパターン・マッピング定義）
  reference_docs:
    - path: "templates/abap/PATTERNS.md"
      description: "ABAP コーディングパターン + 共通クラス API リファレンス"
      load_timing: "phase:execute"
    - path: "templates/evidence_pack_category_mapping.yaml"
      description: "SAP テストカテゴリ → SDD 標準カテゴリマッピング"
      load_timing: "phase:final"

# 設定ファイル
config:
  - path: "config/quality_score_config.yaml"
    description: "品質スコアルール（QR-01〜14 含む）"
  - path: "config/common_class_rules.yaml"
    description: "共通クラスルール（17クラス / 92メソッド）"
  - path: "config/test_perspective_master.yaml"
    description: "テスト観点マスタ"
  - path: "config/test_suggest_config.yaml"
