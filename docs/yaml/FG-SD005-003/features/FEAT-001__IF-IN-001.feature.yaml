processes:
  - id: P1
    name: 取得処理（固定値・送受信先・ファイル）
    trigger: 実行ボタン押下／ジョブ起動
    purpose: 固定値・物流EDIマスタ・ファイルを取得し受信先を特定
    input: 選択画面（販売組織/ファイルパス/ヘッダ行数）
    output: EDI出荷報告データ（明細）
    body: |
        固定値テーブルを一括取得。
        物流EDIマスタから販売組織で受信先(マルコメ)を特定（CHK-001）。
        APサーバのファイルを取得しヘッダ行数分を除外（CHK-002）。0件ならMSG-003で終了。
        ソート（送信元センター/出荷配送依頼No/商品コード）。
    next:
      - target: P2
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in:
        - IN-FILE-001
      out: []
  - id: P2
    name: EDI出荷報告データチェック
    trigger: 取得処理完了
    purpose: 出荷指示との突合と各項目の妥当性チェック
    input: EDI出荷報告データ
    output: 正常データ／エラーデータ
    body: |
        二次店コード(出荷先)が出荷指示と一致（CHK-003）。
        納入予定日・出荷日が日付として妥当（CHK-004）。
        出荷配送依頼No.／商品コードが出荷指示に存在（CHK-005）。
        数量が1〜999999（CHK-006）。
        エラー明細は出荷報告テーブルにエラーメッセージを保持。
    next:
      - target: P3
        condition: 正常終了
      - target: P3
        condition: チェックNG
    uses:
      in: []
      out: []
  - id: P3
    name: テーブル登録（ロットトレース情報・出荷報告）
    trigger: チェック完了
    purpose: 正常データをロットトレース情報テーブルへ登録、履歴を出荷報告テーブルへ保持
    input: 正常データ／エラーデータ
    output: ZMSDT0004／ZMSDT0009
    body: |
        出荷伝票／品目キーで既存を確認し、存在すれば削除後に登録（CALC-001でSEQNO採番）。
        登録/削除失敗時はロールバックしMSG-013で終了。
        完了をMSG-014で出力。
    next:
      - target: 終了
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out:
        - TBL-001
        - TBL-002
        - RPT-001
catalogs:
  calculations:
    - id: CALC-001
      name: シーケンスNo.採番
      inputs: 出荷報告テーブルの既存最大SEQNO
      logic: "1からインクリメントして採番"
      outputs: SEQNO
      judgment: 処理日付・時刻は1ファイル内で同一値
      references: []
  checks:
    - id: CHK-001
      category: 処理エラー
      condition: 受信先(マルコメ)が物流EDIマスタに存在しない
      continueProcessing: 中断
      message: MSG-001
      priority: 高
    - id: CHK-002
      category: 処理エラー
      condition: 入力ファイルがAPサーバに存在しない
      continueProcessing: 中断
      message: MSG-002
      priority: 高
    - id: CHK-003
      category: 入力範囲
      condition: 二次店コード(出荷先)が出荷指示テーブルと一致しない
      continueProcessing: 確認後続行
      message: MSG-005
      priority: 中
    - id: CHK-004
      category: 入力範囲
      condition: 納入予定日・出荷日が日付として正しくない
      continueProcessing: 確認後続行
      message: MSG-006
      priority: 中
    - id: CHK-005
      category: 入力範囲
      condition: 出荷配送依頼No./商品コードが出荷指示に存在しない
      continueProcessing: 確認後続行
      message: MSG-004
      priority: 中
    - id: CHK-006
      category: 入力範囲
      condition: 数量が1〜999999の範囲外
      continueProcessing: 確認後続行
      message: MSG-006
      priority: 中
  messages:
    - id: MSG-001
      type: E
      text: "&1 が &2 に設定されていません"
      placeholders:
        - 送信先(受手)の企業コード
        - 物流EDIマスタ
      references:
        - CHK-001
      t100:
        class: ZMSD0001
        number: "003"
        status: ok
    - id: MSG-002
      type: E
      text: "&1 &2が存在しません"
      placeholders:
        - EDI出荷報告データ
      references:
        - CHK-002
      t100:
        class: ZMZZ0001
        number: "003"
        status: ok
    - id: MSG-003
      type: E
      text: ファイルが空であるか、ヘッダ行しか存在していません
      placeholders: []
      references: []
      t100:
        class: ZMZZ0001
        number: "001"
        status: ok
    - id: MSG-004
      type: E
      text: 出荷配送依頼No.が出荷指示データに存在していません
      placeholders: []
      references:
        - CHK-005
      t100:
        class: ZMSD0001
        number: "091"
        status: ok
    - id: MSG-005
      type: E
      text: "&1 が &2 と異なります"
      placeholders:
        - 出荷先
        - 出荷指示データ
      references:
        - CHK-003
      t100:
        class: ZMZZ0001
        number: "005"
        status: ok
    - id: MSG-006
      type: E
      text: 納入日または引取日が正しく設定されていません
      placeholders: []
      references:
        - CHK-004
        - CHK-006
      t100:
        class: ZMSD0001
        number: "094"
        status: ok
    - id: MSG-007
      type: E
      text: "&1 の登録に失敗しました"
      placeholders:
        - ロットトレース情報テーブル(ZMSDT0004)
      references: []
      t100:
        class: ZMSD0001
        number: "004"
        status: ok
    - id: MSG-008
      type: S
      text: "&1 を完了しました"
      placeholders:
        - EDI出荷報告データ取込
      references: []
      t100:
        class: ZMZZ0001
        number: "033"
        status: ok
