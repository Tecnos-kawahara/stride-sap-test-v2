              io: input
              required: false
              defaultValue: null
              calcRef: null
      visualLayout: ""
      transitionPolicy: ""
      events: |
          〔画面イベント仕様(ロットトレースUL)〕
          画面イベント仕様
          No  項目名  種類  イベント種別  実装種別  入力チェックNo
