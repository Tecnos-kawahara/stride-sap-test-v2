          fields:
            - id: F01
              name: 販売組織
              type: CHAR
              maxLength: "4"
              inputMethod: SELECT-OPTIONS
              io: input
              required: true
              defaultValue: null
              calcRef: null
            - id: F02
              name: 入力ファイルパス(ローカルPC)
              type: STRING
              maxLength: ""
              inputMethod: PARAMETERS
              io: input
              required: true
              defaultValue: null
              calcRef: null
            - id: F03
              name: ヘッダ行数
              type: NUMC
              maxLength: "2"
              inputMethod: PARAMETERS
              io: input
