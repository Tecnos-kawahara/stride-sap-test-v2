          1  －
          2  －
          3  －
      inputChecks: null
      displayRules: null
      alvToolbar: null
      designDetails: {}
  reports: []
  files:
    - id: FILE-001
      name: ロットトレースアップロードデータ
      gate: ok
      kind: CSV(カンマ区切り)
      summary: ""
      fields:
        - 項目ID: 処理区分
          項目名: 処理区分
          参照: ""
          型: ""
          桁: ""
          備考: "I:登録 / U:更新 / D:削除（型/桁は設計書記載なし）"
        - 項目ID: 出荷伝票
          項目名: 出荷伝票
          参照: ""
          型: ""
          桁: ""
          備考: 更新する出荷伝票番号
        - 項目ID: 品目コード
          項目名: 品目コード
          参照: ""
          型: ""
          桁: ""
          備考: 更新する品目コード
        - 項目ID: シーケンスNo.
          項目名: シーケンスNo.
          参照: ""
          型: ""
          桁: ""
          備考: 出荷伝票明細のデータシーケンスNo.(01-99)
        - 項目ID: 数量(ロット)
          項目名: 数量(ロット)
          参照: ""
          型: ""
          桁: ""
          備考: ロットごとの出荷数量(1〜999999)
        - 項目ID: ロット番号
          項目名: ロット番号
          参照: ""
          型: ""
          桁: ""
          備考: 出荷したロット番号
  tables:
    - id: TBL-001
      name: 出荷報告テーブル
      gate: ok
      purpose: ""
      tableNames:
        - ZMSDT0009
      fields:
        - 項目ID: VBELN
          項目名: 出荷伝票
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: MATNR
          項目名: 品目コード
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: R4_BIKOU
          項目名: "4_備考"
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: R2_SHKDT
          項目名: "2_出庫日"
          参照: ""
          型: ""
          桁: ""
          備考: RMBDAT補完元
        - 項目ID: R2_NOKDT
          項目名: "2_納入日または引取日"
          参照: ""
          型: ""
          桁: ""
          備考: RLFDAT補完元
        - 項目ID: PRCDT
          項目名: 処理日付
          参照: ""
          型: ""
          桁: ""
          備考: 最新判定
        - 項目ID: PRCTM
          項目名: 処理時刻
          参照: ""
          型: ""
          桁: ""
          備考: 最新判定
      mainFields: ""
      dataModelOverview: ""
      designDetails: {}
    - id: TBL-002
      name: 出荷ヘッダ
      gate: ok
      purpose: ""
      tableNames:
        - LIKP
      fields:
        - 項目ID: VBELN
          項目名: 出荷伝票
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: VSTEL
          項目名: 出荷ポイント
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: VKORG
          項目名: 販売組織
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: LFART
          項目名: 出荷タイプ
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: LFDAT
          項目名: 納入日付
          参照: ""
          型: ""
          桁: ""
          備考: ""
        - 項目ID: LPRIO
          項目名: 出荷優先順位
