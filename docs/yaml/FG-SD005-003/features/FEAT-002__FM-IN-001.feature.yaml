processes:
  - id: P1
    name: 対象判定（出庫確認BAdI）
    trigger: 出庫確認＝入出庫伝票の登録／修正時（BAdI）
    purpose: 物流EDI対象外拠点・対象伝票・ロット明細のみを処理対象に絞る
    input: 出荷伝票（LIKP/LIPS）・物流EDIマスタ
    output: 処理対象の出荷伝票明細
    body: |
        出庫確認時にBAdIで起動。
        出荷ポイントが物流EDIマスタに登録（＝EDI対象）の拠点は対象外（CHK-001）。
        伝票カテゴリ J/Z100(出荷)=対象、T/Z200(返品)=対象外（CHK-002）。
        ロット番号が設定された明細のみ対象（CHK-003）。
        在庫転送の社内使用・廃棄は勘定設定カテゴリで除外（CHK-004）。
    next:
      - target: P2
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in:
        - IN-TBL-001
        - IN-TBL-002
      out: []
  - id: P2
    name: ロットトレース情報の編集
    trigger: 対象判定OK
    purpose: 出荷伝票・品目マスタ・購買発注からZMSDT0004の各項目を編集
    input: 出荷伝票（LIKP/LIPS）・品目マスタ（MARA）・購買発注明細（EKPO）
    output: ZMSDT0004 レコード（内部テーブル）
    body: |
        受注/在庫転送を伝票区分(V/M)で判定し各項目を編集。
        SEQNOは品目コード毎に01からインクリメント採番（CALC-001）。
        在庫転送かつ仕入先ブランク時は入庫保管場所/出荷先を購買発注（EKPO/EMLIF）から取得。
    next:
      - target: P3
        condition: 正常終了
      - target: P3
        condition: チェックNG
    uses:
      in:
        - IN-TBL-003
        - IN-TBL-004
      out: []
  - id: P3
    name: 登録（汎用モジュール呼び出し）
    trigger: 編集完了
    purpose: 汎用モジュールでロットトレース情報テーブルへ登録
    input: ZMSDT0004 レコード（IT_DATA）
    output: ロットトレース情報テーブル（ZMSDT0004）
    body: |
        Z_MSD_INSERT_ZMSDT0004（処理タイプ：更新即時開始）に IT_DATA を渡して登録。
        登録失敗時はMSG-001を出力。
    next:
      - target: 終了
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out:
        - TBL-001
catalogs:
  calculations:
    - id: CALC-001
      name: シーケンスNo.採番
      inputs: 出荷伝票/品目コード
      logic: 品目コード毎に01からインクリメント
      outputs: SEQNO
      judgment: 同一出荷伝票・品目内で一意
      references: []
  checks:
    - id: CHK-001
      category: 対象判定
      condition: 出荷ポイントが物流EDIマスタに登録済（＝EDI対象）の拠点
      continueProcessing: 確認後続行
      message: ""
      priority: 高
    - id: CHK-002
      category: 対象判定
      condition: 伝票カテゴリが対象外（T/Z200 返品 等。対象はJ/Z100 出荷）
      continueProcessing: 確認後続行
      message: ""
      priority: 中
    - id: CHK-003
      category: 対象判定
      condition: 出荷伝票明細にロット番号が設定されていない
      continueProcessing: 確認後続行
      message: ""
      priority: 中
    - id: CHK-004
      category: 対象判定
      condition: 在庫転送の社内使用・廃棄（勘定設定カテゴリで除外）
      continueProcessing: 確認後続行
      message: ""
      priority: 中
  messages:
    - id: MSG-001
      type: E
      text: "&1 の登録に失敗しました"
      placeholders:
        - ロットトレース情報テーブル(ZMSDT0004)
      references: []
      t100:
        class: ZMSD0001
        number: "004"
        status: ok
    - id: MSG-002
      type: S
      text: "&1 を完了しました"
      placeholders:
        - 出庫確認によるロットトレース情報登録
      references: []
      t100:
        class: ZMZZ0001
        number: "033"
        status: ok
