processes:
  - id: P1
    name: 初期処理
    trigger: INITIALIZATION
    purpose: グローバル変数初期化
    input: ""
    output: ""
    body: グローバル変数を初期化
    next:
      - target: P2
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out: []
  - id: P2
    name: 入力チェック
    trigger: AT SELECTION-SCREEN
    purpose: 必須チェック
    input: 選択画面
    output: ""
    body: |
        販売組織未入力→標準メッセージで選択画面に戻る(CHK-001)。
        更新日付未入力→標準メッセージで選択画面に戻る(CHK-002)。
    next:
      - target: P3
        condition: 正常終了
      - target: P2
        condition: チェックNG
    uses:
      in: []
      out: []
  - id: P3
    name: データ取得
    trigger: START-OF-SELECTION
    purpose: 出荷ロット元データ取得＋最新ロット抽出
    input: "ZMSDT0004⋈KNA1, 選択条件"
    output: 更新対象データ
    body: |
        ZMSDT0004をKNA1(ワンタイム勘定除外)と結合しSELECT。
        出荷先↑品目↑ロット↓納入日↓でソート(CALC-001)→出荷先×品目で重複削除(CALC-002)→更新対象データ。
        ZMSDT0006の既存を取得(更新先データ)。
    next:
      - target: P4
        condition: 正常終了
      - target: P4
        condition: チェックNG
    uses:
      in:
        - IN-TBL-001
        - IN-TBL-002
      out: []
  - id: P4
    name: 更新/登録振り分け
    trigger: 更新対象LOOP
    purpose: 登録用/更新用データ生成
    input: 更新対象データ/更新先データ
    output: 登録用/更新用データ
    body: |
        処理日時を設定(CALC-003)。
        更新先データをVKORG/KUNNR/MATNRでREAD→存在すれば更新用、無ければ登録用に編集(CALC-004)。
    next:
      - target: P5
        condition: 正常終了
      - target: P5
        condition: チェックNG
    uses:
      in: []
      out: []
  - id: P5
    name: テーブル更新
    trigger: 振り分け後
    purpose: ZMSDT0006 登録/更新
    input: 登録用/更新用データ
    output: 最終出荷ロットテーブル(ZMSDT0006)
    body: |
        INSERT(ACCEPTING DUPLICATE KEYS)→失敗時ROLLBACK＋MSG(No.34)。
        UPDATE→失敗時ROLLBACK＋MSG(No.35)。
        処理件数を集計(CALC-005)。COMMIT後 MSG(No.36)。
    next:
      - target: P6
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out:
        - TBL-001
  - id: P6
    name: 終了処理
    trigger: 更新後
    purpose: 結果出力・JOBメッセージ制御
    input: 処理件数
    output: ジョブログ/結果画面
    body: |
        共通部品 ZCL_MSD_003000(RUN_MAIN_PROC/RUN_END_PROC)を呼出。
        バッチ→更新件数 MSG-001(ZMZZ0001/015,S)、汎用モジュール Z_MZZ_JOB_MSGTYP_CTRL でJOBメッセージタイプ制御(v1.01)。
        オンライン→処理件数を結果画面に出力。
    next:
      - target: 終了
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out: []
catalogs:
  calculations:
    - id: CALC-001
      name: 最新ロット抽出ソート
      inputs: ロットトレース情報データ
      logic: 出荷先↑・品目↑・ロット番号↓・納入日付↓ でソート
      outputs: ソート済データ
      judgment: ""
      references: []
    - id: CALC-002
      name: 重複削除
      inputs: ソート済データ
      logic: 出荷先×品目コードで先頭1件を残し重複削除
      outputs: 更新対象データ
      judgment: 出荷先×品目で最新ロット1件
      references: []
    - id: CALC-003
      name: 処理日時設定
      inputs: SY-DATUM/SY-UZEIT
      logic: 処理日付=SY-DATUM、処理時刻=SY-UZEIT
      outputs: 処理日付/処理時刻
      judgment: ""
      references: []
    - id: CALC-004
      name: 更新/登録判定
      inputs: 更新先データ(ZMSDT0006)
      logic: READ TABLE WITH KEY VKORG/KUNNR/MATNR → SY-SUBRC=0なら更新、≠0なら登録
      outputs: 更新/登録区分
      judgment: ""
      references: []
    - id: CALC-005
      name: 処理件数集計
      inputs: SY-DBCNT
      logic: INSERT後 件数=SY-DBCNT、UPDATE後 件数+=SY-DBCNT
      outputs: 処理件数
      judgment: ""
      references: []
  checks:
    - id: CHK-001
      category: 入力必須
      condition: 販売組織が未入力
      continueProcessing: 標準メッセージ出力し選択画面に戻る
      message: ""
      priority: 高
    - id: CHK-002
      category: 入力必須
      condition: 更新日付が未入力
      continueProcessing: 標準メッセージ出力し選択画面に戻る
      message: ""
      priority: 高
  messages:
    - id: MSG-001
      type: S
      text: "&1: &2"
      placeholders:
        - "[固定値]更新件数"
        - "[変数]処理件数"
      references: []
      t100:
        class: ZMZZ0001
        number: "015"
        status: ok
    - id: MSG-002
      type: E
      text: （基本設計書メッセージ一覧 No.34）登録失敗
      placeholders: []
      references: []
      t100:
        class: ""
        number: ""
        status: empty
    - id: MSG-003
      type: E
      text: （基本設計書メッセージ一覧 No.35）更新失敗
      placeholders: []
      references: []
      t100:
        class: ""
        number: ""
        status: empty
    - id: MSG-004
      type: S
      text: （基本設計書メッセージ一覧 No.36）コミット完了
      placeholders: []
      references: []
      t100:
        class: ""
        number: ""
        status: empty
