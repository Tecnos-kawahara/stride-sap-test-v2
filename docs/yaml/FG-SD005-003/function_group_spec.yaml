    output: 最終出荷ロットテーブル(ZMSDT0006)
    body: |
        INSERT(ACCEPTING DUPLICATE KEYS)→失敗時ROLLBACK＋MSG(No.34)。
        UPDATE→失敗時ROLLBACK＋MSG(No.35)。
        処理件数を集計(CALC-005)。COMMIT後 MSG(No.36)。
    next:
