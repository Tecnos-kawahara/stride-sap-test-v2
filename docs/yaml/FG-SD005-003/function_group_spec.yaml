    body: |
        ZMSDT0004をKNA1(ワンタイム勘定除外)と結合しSELECT。
        出荷先↑品目↑ロット↓納入日↓でソート(CALC-001)→出荷先×品目で重複削除(CALC-002)→更新対象データ。
