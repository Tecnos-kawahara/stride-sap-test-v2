    purpose: ALV出力データ生成
    input: 抽出データ
    output: ALV出力データ
    body: |
        28項目を書式編集(CALC-001)。
        MBDAT/ILGORT/KUNNR/VBELN/MATNR/SEQNOの6キーで昇順ソート。
    next:
      - target: P6
        condition: 正常終了
      - target: P6
        condition: チェックNG
    uses:
      in: []
      out: []
  - id: P6
    name: 結果出力
    trigger: 編集完了
    purpose: ALV表示
    input: ALV出力データ
    output: ALV画面
    body: |
        ロット属性表示をユーザパラメータで判定(CALC-002)。
        FIELDCATALOG_MERGE→項目カタログ編集(CALC-003)→REUSE_ALV_GRID_DISPLAYで表示。
    next:
      - target: 終了
        condition: 正常終了
      - target: 終了
        condition: チェックNG
    uses:
      in: []
      out:
        - RPT-001
catalogs:
  calculations:
    - id: CALC-001
      name: 出力項目書式編集
      inputs: 抽出データ各項目
      logic: VBELN/VGBEL/KUNNR/MATNR/RLFIMG等を外部書式、日付6項目をYYYY/MM/DDに変換
      outputs: ALV出力データ
      judgment: ""
      references: []
    - id: CALC-002
      name: ロット属性表示判定
      inputs: 固定値テーブル(UPARA/CHARG_ATT)→GET PARAMETER ID
      logic: "'X'(オン)ならALV構造=ロット属性有り(賞味期限/製造日付表示)、それ以外は無し"
      outputs: ALV構造名
      judgment: "ユーザパラメータ='X'"
      references: []
    - id: CALC-003
      name: ALV項目カタログ編集
      inputs: REUSE_ALV_FIELDCATALOG_MERGEの項目カタログ
      logic: "VRKMEをTECH='X'(非表示)、VRKME_O系6項目のテキスト/参照をブランク化、COLWIDTH_OPTIMIZE"
      outputs: 編集後カタログ
      judgment: ""
      references: []
  checks:
    - id: CHK-001
      category: 入力必須
      condition: 販売組織(S_VKORG)が未入力
      continueProcessing: 確認後続行
      message: MSG-001
      priority: 高
    - id: CHK-002
      category: 入力範囲
      condition: 品目利用可能日(S_MBDAT)・納入日付(S_LFDAT)がいずれも未入力
      continueProcessing: 確認後続行
      message: MSG-002
      priority: 高
    - id: CHK-003
      category: 処理エラー
      condition: 検索結果が0件
      continueProcessing: 確認後続行
      message: MSG-001
      priority: 中
  messages:
    - id: MSG-001
      type: E
      text: 対象データが存在しません
      placeholders: []
      references:
        - CHK-001
        - CHK-003
      t100:
        class: ""
        number: ""
        status: empty
    - id: MSG-002
      type: E
      text: 品目利用可能日・納入日付がいずれも未入力です
      placeholders: []
      references:
        - CHK-002
      t100:
        class: ""
        number: ""
        status: empty
