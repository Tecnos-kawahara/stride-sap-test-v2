version: 1.0
defaults:
  execution_lane: FIRE
decision:
  - id: need_execution_tracking
    question: "実行トラッキング（変更監査・横展開・非同期レビュー）が必要か？"
    if_no: SIMPLE
    if_yes: next
  - id: ceremony_style
    question: "チェックポイント（人手検証）をリスクで可変にするか？固定で多段にするか？"
    if_adaptive: FIRE
    if_fixed: AI_DLC
notes:
  SIMPLE: "仕様生成・引継ぎ・見積もり。execution trackingなし。"
  FIRE: "既存資産（brownfield）で高速実行。runs/state/walkthrough。"
  AI_DLC: "複雑ドメイン/監査。Inception→Construction→Operations（Runbook等）。"
