# Authorization Matrix - mcframe受注管理アドオン
# AC: AC-US-FEATERPOMS-002-01（金額別3段階承認）

roles:
  - id: operator
    name: "受注担当者"
    permissions:
      - { resource: orders, actions: [create, read, update] }
      - { resource: order_items, actions: [create, read, update, delete] }
      - { resource: approval_records, actions: [read] }
    approval_limit: null  # 承認権限なし

  - id: manager
    name: "営業マネージャー / 部長"
    permissions:
      - { resource: orders, actions: [create, read, update, approve] }
      - { resource: order_items, actions: [create, read, update, delete] }
      - { resource: approval_records, actions: [create, read] }
    approval_limit: 5000000  # 500万円未満

  - id: admin
    name: "役員 / システム管理者"
    permissions:
      - { resource: orders, actions: [create, read, update, delete, approve] }
      - { resource: order_items, actions: [create, read, update, delete] }
      - { resource: approval_records, actions: [create, read] }
      - { resource: audit_logs, actions: [read] }
    approval_limit: null  # 無制限

approval_thresholds:
  - amount_gte: 0
    amount_lt: 1000000
    level: auto
    description: "100万円未満: 自動承認"
  - amount_gte: 1000000
    amount_lt: 5000000
    level: manager
    description: "100万円以上〜500万円未満: 部長承認"
  - amount_gte: 5000000
    amount_lt: null
    level: admin
    description: "500万円以上: 役員承認"

sod_rules:
  - rule: "受注登録者と承認者は同一人物であってはならない"
    enforcement: "API層で created_by !== approver_id を検証"
