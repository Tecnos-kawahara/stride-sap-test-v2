# Test Scenarios - mcframe受注管理アドオン
# Feature: FEAT-ERP-OMS

scenarios:
  # --- 受注登録 (US-FEATERPOMS-001) ---
  - id: "SC-001"
    title: "正常系: 受注登録→DB保存"
    use_case: "US-FEATERPOMS-001"
    covers_ac: ["AC-US-FEATERPOMS-001-01"]
    test_ref: "TS-INT-01"
    preconditions:
      - "顧客ID: CUST-001 がマスタに存在"
      - "品目コード: PROD-A001 がマスタに存在"
    input:
      customer_id: "CUST-001"
      items:
        - { product_code: "PROD-A001", quantity: 10, unit_price: 5000 }
      delivery_date: "2026-03-15"
    expected:
      status_code: 201
      body:
        order_id: "（UUID形式）"
        status: "PENDING_APPROVAL"
        total_amount: 50000

  - id: "SC-002"
    title: "正常系: 確認ダイアログ表示"
    use_case: "US-FEATERPOMS-001"
    covers_ac: ["AC-US-FEATERPOMS-001-02"]
    test_ref: "TS-E2E-01"
    preconditions:
      - "受注登録画面が表示されている"
      - "必須項目が入力済み"
    input:
      action: "登録ボタンをクリック"
    expected:
      dialog_displayed: true
      dialog_text_contains: "登録してよろしいですか"
      on_ok: "受注がDB保存される"
      on_cancel: "入力画面に戻る"

  - id: "SC-003"
    title: "正常系: mcframe在庫引当"
    use_case: "US-FEATERPOMS-001"
    covers_ac: ["AC-US-FEATERPOMS-001-03"]
    test_ref: "TS-INT-02"
    preconditions:
      - "受注登録が成功している"
      - "mcframe在庫が十分"
    input:
      order_id: "（SC-001で作成した受注）"
      items:
        - { product_code: "PROD-A001", quantity: 10 }
    expected:
      allocation_status: "ALLOCATED"
      allocated_quantity: 10

  - id: "SC-004"
    title: "異常系: 在庫不足時のPENDING"
    use_case: "US-FEATERPOMS-001"
    covers_ac: ["AC-US-FEATERPOMS-001-03"]
    test_ref: "TS-INT-02"
    preconditions:
      - "mcframe在庫が不足（品目: PROD-A001 残0）"
    input:
      items:
        - { product_code: "PROD-A001", quantity: 100 }
    expected:
      order_status: "PENDING_STOCK"
      allocation_status: "INSUFFICIENT"

  - id: "SC-005"
    title: "異常系: 必須項目未入力"
    use_case: "US-FEATERPOMS-001"
    covers_ac: ["AC-US-FEATERPOMS-001-01"]
    test_ref: "TS-CON-01"
    preconditions: []
    input:
      customer_id: null
      items: []
    expected:
      status_code: 400
      error_code: "VALIDATION_ERROR"

  # --- 受注承認 (US-FEATERPOMS-002) ---
  - id: "SC-006"
    title: "正常系: 100万円未満 → 自動承認"
    use_case: "US-FEATERPOMS-002"
    covers_ac: ["AC-US-FEATERPOMS-002-01"]
    test_ref: "TS-INT-03"
    preconditions:
      - "受注 total_amount: 500,000"
    input:
      order_total: 500000
    expected:
      approval_level: "auto"
      status_after: "APPROVED"

  - id: "SC-007"
    title: "正常系: 100万円以上 → 部長承認"
    use_case: "US-FEATERPOMS-002"
    covers_ac: ["AC-US-FEATERPOMS-002-01"]
    test_ref: "TS-INT-03"
    preconditions:
      - "受注 total_amount: 2,000,000"
      - "承認者ロール: manager"
    input:
      order_total: 2000000
      approver_role: "manager"
    expected:
      approval_level: "manager"
      requires_approval: true

  - id: "SC-008"
    title: "正常系: 500万円以上 → 役員承認"
    use_case: "US-FEATERPOMS-002"
    covers_ac: ["AC-US-FEATERPOMS-002-01"]
    test_ref: "TS-INT-03"
    preconditions:
      - "受注 total_amount: 10,000,000"
      - "承認者ロール: admin"
    input:
      order_total: 10000000
      approver_role: "admin"
    expected:
      approval_level: "admin"
      requires_approval: true

  - id: "SC-009"
    title: "異常系: 権限不足で承認拒否"
    use_case: "US-FEATERPOMS-002"
    covers_ac: ["AC-US-FEATERPOMS-002-01"]
    test_ref: "TS-INT-03"
    preconditions:
      - "受注 total_amount: 10,000,000"
      - "承認者ロール: manager（上限500万）"
    input:
      approver_role: "manager"
    expected:
      status_code: 403
      error_code: "INSUFFICIENT_APPROVAL_AUTHORITY"

  - id: "SC-010"
    title: "SoD: 登録者と承認者が同一人物"
    use_case: "US-FEATERPOMS-002"
    covers_ac: ["AC-US-FEATERPOMS-002-01"]
    test_ref: "TS-INT-03"
    preconditions:
      - "受注 created_by: user-001"
      - "承認者: user-001（同一）"
    expected:
      status_code: 403
      error_code: "SOD_VIOLATION"

  # --- 監査ログ (AC-US-FEATERPOMS-002-02) ---
  - id: "SC-011"
    title: "監査ログ: 受注作成時に記録"
    covers_ac: ["AC-US-FEATERPOMS-002-02"]
    test_ref: "TS-INT-04"
    input:
      action: "受注を作成"
    expected:
      audit_log:
        user_id: "（操作者ID）"
        action: "CREATE"
        target_type: "ORDER"
        target_id: "（受注ID）"
        timestamp: "（ISO8601）"

  - id: "SC-012"
    title: "監査ログ: 承認時に記録"
    covers_ac: ["AC-US-FEATERPOMS-002-02"]
    test_ref: "TS-INT-04"
    input:
      action: "受注を承認"
    expected:
      audit_log:
        action: "APPROVE"
        target_type: "ORDER"
