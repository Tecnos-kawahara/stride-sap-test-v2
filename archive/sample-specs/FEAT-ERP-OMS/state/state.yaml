# GitHub Projects Mapping (v4.4 enhanced)
github_projects:
  project_id: "PVT_kwDODxCmtc4BPMem"
  project_number: 2
  project_title: "Tecnos-STRIDE SDD Board"

  # Issue Types
  issue_types:
    - { sdd_type: "epic", template: "ISSUE_TEMPLATE/epic.md", prefix: "[EPIC]" }
    - { sdd_type: "milestone", template: "ISSUE_TEMPLATE/milestone.md", prefix: "[MS]" }
    - { sdd_type: "work_item", template: "ISSUE_TEMPLATE/work-item.md", prefix: "[WI]" }
    - { sdd_type: "risk", template: "ISSUE_TEMPLATE/risk.md", prefix: "[RISK]" }

  # Label Mapping
  labels:
    - { sdd_concept: "coverage_tier", github_label: "tier:standard" }
    - { sdd_concept: "mode:autopilot", github_label: "mode:autopilot" }
    - { sdd_concept: "mode:validate", github_label: "mode:validate" }
    - { sdd_concept: "risk:authz", github_label: "risk:authz" }
    - { sdd_concept: "risk:audit_log", github_label: "risk:audit_log" }
    - { sdd_concept: "risk:ui_only", github_label: "risk:ui_only" }

  # Gate Milestone Mapping
  milestones:
    - { sdd_gate: "Gate1", github_milestone: "Gate 1: Design Review" }
    - { sdd_gate: "Gate2", github_milestone: "Gate 2: BPMN Review" }
    - { sdd_gate: "Gate3", github_milestone: "Gate 3: Spec Review" }
    - { sdd_gate: "Gate4", github_milestone: "Gate 4: Plan Review" }
    - { sdd_gate: "Gate5", github_milestone: "Gate 5: Tasking Review" }
    - { sdd_gate: "Final", github_milestone: "Final: Evidence Review" }

  # Epic Milestone Mapping
  epic_milestones:
    - { epic_milestone: "EM-01", github_milestone: "EM-01: 受注登録基盤完了", target_date: "2026-02-10" }
    - { epic_milestone: "EM-02", github_milestone: "EM-02: 権限・承認・監査完了", target_date: "2026-03-01" }
    - { epic_milestone: "EM-03", github_milestone: "EM-03: Epic統合完了・リリース", target_date: "2026-03-15" }

  # PM Dashboard Views
  views:
    - name: "Epic Overview"
      type: table
      filter: "label:epic,work-item"
      description: "PM俯瞰ビュー: Epic + WI一覧"
    - name: "Kanban Board"
      type: board
      filter: "label:work-item"
      columns: ["Backlog", "In Progress", "Review", "Done"]
      description: "WI進捗カンバン"
    - name: "Risk Heatmap"
      type: table
      filter: "label:risk,blocker"
      sort: "impact DESC"
      description: "リスク・ブロッカー一覧"
    - name: "Milestone Timeline"
      type: roadmap
      filter: "label:milestone"
      description: "マイルストーン時系列"
    - name: "Ops Readiness"
      type: table
      filter: "label:work-item"
      description: "リリース準備状況"
    - name: "Process Metrics"
      type: table
      filter: "label:work-item"
      sort: "Delay Risk ASC"
      description: "Gate滞留時間・遅延リスク分析"

  # Artifact Links (PM navigation)
  pm_artifacts:
    dashboard: "epics/EPIC-SAMPLE/PM_DASHBOARD.md"
    progress_report: "epics/EPIC-SAMPLE/EPIC_PROGRESS_REPORT.md"
    dependency_manifest: "epics/EPIC-SAMPLE/DEPENDENCY_MANIFEST.yaml"
    ops_pack_registry: "epics/EPIC-SAMPLE/OPS_PACK_REGISTRY.yaml"

  setup_guide: "sdd-templates/templates/github-projects/setup-guide.md"
