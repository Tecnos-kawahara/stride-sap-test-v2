# Transport Manifest - mcframe受注管理アドオン
# Feature: FEAT-ERP-OMS

transport:
  type: "container"
  artifacts:
    - name: "order-addon-api"
      type: "docker-image"
      registry: "ghcr.io/tecnos-japan-cbp/order-addon-api"
      tag: "1.0.0"
    - name: "order-addon-web"
      type: "docker-image"
      registry: "ghcr.io/tecnos-japan-cbp/order-addon-web"
      tag: "1.0.0"
    - name: "db-migration"
      type: "alembic-migration"
      path: "src/migrations/"
      target_revision: "a1b2c3d4"

  dependencies:
    - name: "PostgreSQL"
      version: ">=15"
    - name: "mcframe API"
      version: "v2"
      endpoint: "/api/v2/stock/allocate"

  environment_variables:
    - { name: DATABASE_URL, secret: true }
    - { name: MCFRAME_API_URL, secret: false }
    - { name: MCFRAME_API_KEY, secret: true }
