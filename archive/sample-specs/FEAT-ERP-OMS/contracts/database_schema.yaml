# Database Schema - mcframe受注管理アドオン
# Feature: FEAT-ERP-OMS
# Dialect: PostgreSQL
# Migration: Alembic (versioned)

database_schema:
  meta:
    schema_id: "DB-FEAT-ERPOMS"
    dialect: "postgresql"
    migration_tool: "alembic"
    version: "1.0.0"
  traceability:
    basic_design_ref: "specs/sample_erp_addon/basic_design.md"
    spec_ref: "specs/sample_erp_addon/spec.md"
    api_contract_ref: "specs/sample_erp_addon/contracts/api.yaml"
  tables:
    - name: orders
      description: "受注ヘッダ"
      sor: true
      columns:
        - { name: id, type: uuid, primary_key: true, default: "gen_random_uuid()" }
        - { name: order_number, type: varchar(20), nullable: false, unique: true }
        - { name: customer_id, type: varchar(20), nullable: false }
        - { name: status, type: varchar(20), nullable: false, default: "'DRAFT'", check: "status IN ('DRAFT','PENDING_APPROVAL','APPROVED','REJECTED','PENDING_STOCK')" }
        - { name: total_amount, type: "numeric(15,2)", nullable: false, default: 0 }
        - { name: delivery_date, type: date, nullable: false }
        - { name: notes, type: text, nullable: true }
        - { name: approval_level, type: varchar(20), nullable: true, comment: "auto|manager|director" }
        - { name: idempotency_key, type: varchar(64), nullable: true, unique: true }
        - { name: created_by, type: varchar(50), nullable: false }
        - { name: updated_by, type: varchar(50), nullable: false }
        - { name: created_at, type: timestamptz, nullable: false, default: "now()" }
        - { name: updated_at, type: timestamptz, nullable: false, default: "now()" }
      indexes:
        - { name: idx_orders_customer, columns: [customer_id] }
        - { name: idx_orders_status, columns: [status] }
        - { name: idx_orders_created, columns: [created_at] }

    - name: order_items
      description: "受注明細"
      sor: true
      columns:
        - { name: id, type: uuid, primary_key: true, default: "gen_random_uuid()" }
        - { name: order_id, type: uuid, nullable: false, references: "orders(id)" }
        - { name: product_code, type: varchar(20), nullable: false }
        - { name: quantity, type: integer, nullable: false, check: "quantity > 0" }
        - { name: unit_price, type: "numeric(15,2)", nullable: false }
        - { name: subtotal, type: "numeric(15,2)", nullable: false }
        - { name: stock_allocation_id, type: varchar(50), nullable: true }
        - { name: stock_status, type: varchar(20), nullable: true, comment: "ALLOCATED|PARTIAL|INSUFFICIENT" }
        - { name: created_by, type: varchar(50), nullable: false }
        - { name: updated_by, type: varchar(50), nullable: false }
        - { name: created_at, type: timestamptz, nullable: false, default: "now()" }
        - { name: updated_at, type: timestamptz, nullable: false, default: "now()" }
      indexes:
        - { name: idx_order_items_order, columns: [order_id] }

    - name: approval_records
      description: "承認履歴"
      sor: true
      columns:
        - { name: id, type: uuid, primary_key: true, default: "gen_random_uuid()" }
        - { name: order_id, type: uuid, nullable: false, references: "orders(id)" }
        - { name: approver_id, type: varchar(50), nullable: false }
        - { name: approver_role, type: varchar(20), nullable: false }
        - { name: action, type: varchar(10), nullable: false, check: "action IN ('approve','reject')" }
        - { name: comment, type: text, nullable: true }
        - { name: created_at, type: timestamptz, nullable: false, default: "now()" }
      indexes:
        - { name: idx_approval_order, columns: [order_id] }

    - name: audit_logs
      description: "監査ログ（AC-US-FEATERPOMS-002-02準拠）"
      sor: true
      columns:
        - { name: id, type: uuid, primary_key: true, default: "gen_random_uuid()" }
        - { name: user_id, type: varchar(50), nullable: false }
        - { name: action, type: varchar(30), nullable: false, comment: "CREATE|UPDATE|DELETE|APPROVE|REJECT" }
        - { name: target_type, type: varchar(30), nullable: false, comment: "ORDER|ORDER_ITEM|APPROVAL" }
        - { name: target_id, type: uuid, nullable: false }
        - { name: details, type: jsonb, nullable: true, comment: "変更前後のスナップショット" }
        - { name: correlation_id, type: varchar(64), nullable: true }
        - { name: ip_address, type: varchar(45), nullable: true }
        - { name: timestamp, type: timestamptz, nullable: false, default: "now()" }
      indexes:
        - { name: idx_audit_user, columns: [user_id] }
        - { name: idx_audit_target, columns: [target_type, target_id] }
        - { name: idx_audit_timestamp, columns: [timestamp] }
