openapi: "3.1.0"
info:
  title: "mcframe受注管理アドオン API"
  version: "1.0.0"
  description: "受注登録・承認・mcframe連携のREST API"

servers:
  - url: "https://erp-addon.tecnos.local/api/v1"
    description: "Development"

paths:
  /orders:
    post:
      operationId: createOrder
      summary: "受注登録"
      description: "受注データを登録し、mcframe在庫引当を実行"
      tags: [orders]
      # Contract: CT-API-01
      # AC: AC-US-FEATERPOMS-001-01
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: "受注登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "在庫不足（PENDING状態で保存）"

    get:
      operationId: listOrders
      summary: "受注一覧取得"
      tags: [orders]
      # Contract: CT-API-02
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING_APPROVAL, APPROVED, REJECTED, PENDING_STOCK]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "受注一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/{orderId}/approve:
    post:
      operationId: approveOrder
      summary: "受注承認"
      tags: [approval]
      # Contract: CT-API-04
      # AC: AC-US-FEATERPOMS-002-01
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "200":
          description: "承認完了"
        "403":
          description: "権限不足"

  /auth/permissions:
    get:
      operationId: getPermissions
      summary: "権限情報取得"
      tags: [auth]
      # Contract: CT-API-04
      responses:
        "200":
          description: "権限情報"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsResponse"

  /mcframe/stock-allocation:
    post:
      operationId: allocateStock
      summary: "mcframe在庫引当"
      tags: [mcframe]
      # Contract: CT-API-03
      # AC: AC-US-FEATERPOMS-001-03
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAllocationRequest"
      responses:
        "200":
          description: "在庫引当成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAllocationResponse"
        "409":
          description: "在庫不足"

components:
  schemas:
    CreateOrderRequest:
      type: object
      required: [customer_id, items, delivery_date]
      properties:
        customer_id:
          type: string
          description: "顧客ID"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemRequest"
        delivery_date:
          type: string
          format: date
        notes:
          type: string
        idempotency_key:
          type: string
          description: "冪等性キー"

    OrderItemRequest:
      type: object
      required: [product_code, quantity, unit_price]
      properties:
        product_code:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number

    OrderResponse:
      type: object
      properties:
        order_id:
          type: string
          description: "発行された受注ID"
        status:
          type: string
          enum: [DRAFT, PENDING_APPROVAL, APPROVED, PENDING_STOCK]
        total_amount:
          type: number
        stock_allocation:
          $ref: "#/components/schemas/StockAllocationResponse"
        created_at:
          type: string
          format: date-time

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderResponse"
        total:
          type: integer
        page:
          type: integer

    ApprovalRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject]
        comment:
          type: string

    PermissionsResponse:
      type: object
      properties:
        role:
          type: string
          enum: [admin, manager, operator]
        approval_limit:
          type: number
          description: "承認可能上限金額（null=無制限）"

    StockAllocationRequest:
      type: object
      required: [order_id, items]
      properties:
        order_id:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              product_code:
                type: string
              quantity:
                type: integer
        correlation_id:
          type: string
        idempotency_key:
          type: string

    StockAllocationResponse:
      type: object
      properties:
        allocation_id:
          type: string
        status:
          type: string
          enum: [ALLOCATED, PARTIAL, INSUFFICIENT]
        allocated_items:
          type: array
          items:
            type: object
            properties:
              product_code:
                type: string
              allocated_quantity:
                type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
