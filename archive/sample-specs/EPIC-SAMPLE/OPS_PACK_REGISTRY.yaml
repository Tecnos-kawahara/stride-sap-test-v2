# ops_pack_registry.yaml - EPIC-SAMPLE
#
# Epic: mcframe受注管理アドオン
# Tracks operational readiness for each Work Item

ops_pack_registry:
  meta:
    epic_id: "EPIC-SAMPLE"
    title: "Ops Pack Registry"
    version: "1.0.0"
    created_at: "2026-02-10"
    updated_at: "2026-02-15"
    maintainer: "鈴木次郎"

  entries:
    # --- WI-ERP-SAMPLE-001: 受注登録画面のUI改善 ---
    - wi_id: "WI-ERP-SAMPLE-001"
      feature_id: "FEAT-ERP-OMS"
      team_id: "TEAM-SALES"
      title: "受注登録画面のUI改善"

      transport:
        has_transport_plan: true
        transport_type: "automated"
        transport_path: "specs/sample_erp_addon/ops/transport_manifest.yaml"
        transport_objects:
          - type: "docker-image"
            name: "order-addon-web"
            transport_request: "ghcr.io/tecnos-japan-cbp/order-addon-web:1.0.0"
        verified: true
        notes: "UIのみ変更。Webコンテナイメージのみ更新"

      rollback:
        has_rollback_plan: true
        rollback_type: "full"
        rollback_path: "specs/sample_erp_addon/ops/rollback_plan.md"
        rollback_steps:
          - step: 1
            description: "前バージョンのWebコンテナイメージにロールバック"
            owner: "@yamada"
            estimated_duration: "5min"
        rollback_tested: true
        max_rollback_window: "unlimited"
        data_loss_risk: "none"
        notes: "UIのみ。DB変更なし、ロールバックリスク極小"

      hypercare:
        has_hypercare_plan: true
        hypercare_duration: "2 weeks"
        hypercare_path: "specs/sample_erp_addon/ops/hypercare_runbook.md"
        monitoring:
          dashboards:
            - name: "order-addon Dashboard"
              url: "https://grafana.tecnos.local/d/order-addon"
          alerts:
            - name: "API Response Time"
              threshold: "P95 > 5s"
              notification_channel: "Slack #ops-order-addon"
            - name: "Error Rate"
              threshold: "> 5%"
              notification_channel: "Slack #ops-order-addon"
          health_checks:
            - name: "API Health"
              endpoint: "/health"
              frequency: "every 1min"
        support_rotation:
          - name: "@yamada"
            team_id: "TEAM-SALES"
            shift: "business_hours"
          - name: "@sato"
            team_id: "TEAM-SALES"
            shift: "business_hours"
        escalation_contacts:
          - level: 1
            contact: "@yamada, @sato"
            response_time: "30min"
          - level: 2
            contact: "鈴木次郎 (Tech Lead)"
            response_time: "1h"
          - level: 3
            contact: "田中太郎 (PM) + mcframeチーム"
            response_time: "2h"
        notes: ""

      ops_review:
        status: "approved"
        reviewer: "鈴木次郎"
        review_date: "2026-02-10"
        findings: []
        approval_conditions: []
        waiver_reason: ""

      erp_integration:
        has_erp_integration: true
        integration_type: "outbound"
        erp_modules_affected:
          - "SD (Sales & Distribution)"
        interface_refs:
          - "CT-API-03"
          - "SC-API-MCFRAME"
        data_migration_required: false
        data_migration_plan_path: ""
        cutover_steps:
          - step: 1
            description: "mcframe在庫引当API接続確認（本番エンドポイント）"
            owner: "@yamada"
            duration: "30min"
            rollback_possible: true
        erp_test_client: "mcframe-staging-001"
        notes: "mcframe API v2は既存本番環境で稼働中。新規接続のみ"

      readiness:
        ops_ready: true
        go_live_approved: false
        go_live_date: ""
        notes: "WI-001分のOps準備は完了。Final Gateは全WI完了後"

    # --- WI-ERP-SAMPLE-002: 権限チェックロジック追加 ---
    - wi_id: "WI-ERP-SAMPLE-002"
      feature_id: "FEAT-ERP-OMS"
      team_id: "TEAM-SALES"
      title: "権限チェックロジック追加"

      transport:
        has_transport_plan: true
        transport_type: "automated"
        transport_path: "specs/sample_erp_addon/ops/transport_manifest.yaml"
        transport_objects:
          - type: "docker-image"
            name: "order-addon-api"
            transport_request: "ghcr.io/tecnos-japan-cbp/order-addon-api:1.1.0"
          - type: "alembic-migration"
            name: "add_audit_logs_table"
            transport_request: "src/migrations/ → revision b2c3d4e5"
        verified: false
        notes: "API + DB変更あり。staging環境での検証が必要"

      rollback:
        has_rollback_plan: true
        rollback_type: "full"
        rollback_path: "specs/sample_erp_addon/ops/rollback_plan.md"
        rollback_steps:
          - step: 1
            description: "APIコンテナを前バージョンにロールバック"
            owner: "@yamada"
            estimated_duration: "5min"
          - step: 2
            description: "AlembicでDBダウングレード（audit_logsテーブル削除）"
            owner: "@yamada"
            estimated_duration: "10min"
          - step: 3
            description: "mcframe引当状態の整合性確認"
            owner: "@yamada"
            estimated_duration: "15min"
        rollback_tested: false
        max_rollback_window: "24h"
        data_loss_risk: "minimal"
        notes: "ロールバック時にaudit_logsデータは失われるが、業務データ（orders, order_items）は保持"

      hypercare:
        has_hypercare_plan: true
        hypercare_duration: "2 weeks"
        hypercare_path: "specs/sample_erp_addon/ops/hypercare_runbook.md"
        monitoring:
          dashboards:
            - name: "order-addon Dashboard"
              url: "https://grafana.tecnos.local/d/order-addon"
          alerts:
            - name: "Authorization Failures"
              threshold: "> 10 per hour"
              notification_channel: "Slack #ops-order-addon"
            - name: "Audit Log Gap"
              threshold: "operations without audit entry > 0"
              notification_channel: "Slack #ops-order-addon"
          health_checks:
            - name: "API Health"
              endpoint: "/health"
              frequency: "every 1min"
            - name: "Audit Log Health"
              endpoint: "/health/audit"
              frequency: "every 5min"
        support_rotation:
          - name: "@yamada"
            team_id: "TEAM-SALES"
            shift: "business_hours"
          - name: "@sato"
            team_id: "TEAM-SALES"
            shift: "business_hours"
        escalation_contacts:
          - level: 1
            contact: "@yamada, @sato"
            response_time: "15min"
          - level: 2
            contact: "鈴木次郎 (Tech Lead)"
            response_time: "30min"
          - level: 3
            contact: "田中太郎 (PM) + mcframeチーム"
            response_time: "1h"
        notes: "権限関連の障害はセキュリティインシデントとして扱い、L1応答時間を短縮"

      ops_review:
        status: "not_started"
        reviewer: "鈴木次郎"
        review_date: ""
        findings: []
        approval_conditions:
          - "ロールバック手順のstaging環境での検証完了"
          - "権限関連の監視アラート設定完了"
        waiver_reason: ""

      erp_integration:
        has_erp_integration: true
        integration_type: "outbound"
        erp_modules_affected:
          - "SD (Sales & Distribution)"
        interface_refs:
          - "CT-API-03"
          - "CT-API-04"
          - "SC-API-MCFRAME"
        data_migration_required: false
        data_migration_plan_path: ""
        cutover_steps:
          - step: 1
            description: "DBマイグレーション実行（audit_logs, approval_records）"
            owner: "@yamada"
            duration: "15min"
            rollback_possible: true
          - step: 2
            description: "権限マトリクス初期データ投入"
            owner: "@yamada"
            duration: "10min"
            rollback_possible: true
          - step: 3
            description: "APIコンテナデプロイ + ヘルスチェック"
            owner: "@yamada"
            duration: "10min"
            rollback_possible: true
        erp_test_client: "mcframe-staging-001"
        notes: "承認フロー追加により、mcframe在庫引当のタイミングが承認後に変更される"

      readiness:
        ops_ready: false
        go_live_approved: false
        go_live_date: ""
        notes: "WI-002未実装。実装完了後にOps Review実施"

  # Epic-level ops summary
  summary:
    total_entries: 2
    by_ops_review_status:
      not_started: 1
      in_progress: 0
      approved: 1
      rejected: 0
      waived: 0
    transport_coverage:
      has_plan: 2
      verified: 1
      missing: 0
    rollback_coverage:
      has_plan: 2
      tested: 1
      missing: 0
    hypercare_coverage:
      has_plan: 2
      missing: 0
    erp_integration_count: 2
    data_migration_count: 0
    all_ops_ready: false
    all_go_live_approved: false

  # Go-live checklist (epic-level)
  go_live_checklist:
    - item: "All ops reviews approved or waived"
      status: false
    - item: "All transport plans verified in staging"
      status: false
    - item: "All rollback procedures tested"
      status: false
    - item: "Hypercare rotation confirmed"
      status: true
    - item: "Monitoring dashboards and alerts configured"
      status: true
    - item: "ERP cutover plan reviewed and approved"
      status: false
    - item: "Communication plan distributed to stakeholders"
      status: false
    - item: "Fallback environment available"
      status: true

  # Go-live schedule
  go_live_schedule:
    planned_date: "2026-03-15"
    go_no_go_decision_date: "2026-03-13"
    decision_maker: "田中太郎 (Sponsor)"
    cutover_window:
      start: "2026-03-15 06:00"
      end: "2026-03-15 09:00"
      timezone: "Asia/Tokyo"
    rollback_deadline: "2026-03-16 06:00"
