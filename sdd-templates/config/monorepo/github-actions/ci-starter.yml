# Starter CI - SDD Template Standard
# Generated by: stride init (scale: starter)
#
# Minimal CI for single-package monorepo.
# As your project grows, upgrade to standard/enterprise:
#   stride init <feature> --scale standard

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npx turbo run build

      - name: Test
        run: npx turbo run test

      # SDD stride-lint
      - name: SDD Spec Lint
        run: sdd-templates/bin/stride lint --all --warn-only
