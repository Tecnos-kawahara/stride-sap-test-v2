# Enterprise CI/CD - SDD Template Standard
# Generated by: stride init --scale enterprise
#
# Features:
# - Turborepo Remote Cache (Vercel or custom)
# - Full differential execution on all branches
# - SDD stride-lint integration
# - Evidence Pack artifact collection with extended retention
#
# Setup Remote Cache:
#   npx turbo login
#   npx turbo link
# Or set TURBO_TOKEN + TURBO_TEAM environment variables in GitHub Secrets.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate diff detection

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Differential execution: affected packages only
      - name: Lint (affected)
        run: npx turbo run lint --filter=...[HEAD~1]

      - name: Typecheck (affected)
        run: npx turbo run typecheck --filter=...[HEAD~1]

      - name: Test (affected)
        run: npx turbo run test --filter=...[HEAD~1]

      # Spec Drift Detection (contracts/ vs src/)
      - name: Spec Drift Check
        run: npx turbo run spec:drift || python3 sdd-templates/tools/spec_drift_detector.py . --json
        continue-on-error: true

      # SDD stride-lint (outside Turborepo pipeline)
      - name: SDD Spec Lint
        run: sdd-templates/bin/stride lint --all --warn-only

  # Coverage + Contract Tests (runs on push to main/develop)
  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test with Coverage (all packages)
        run: npx turbo run test:coverage

      - name: Contract Tests (all packages)
        run: npx turbo run test:contract

      # Evidence Metrics Collection
      - name: Collect Evidence Metrics
        run: python3 sdd-templates/tools/evidence_metrics_collector.py . --json > evidence-metrics.json
        continue-on-error: true

      # Evidence Pack artifacts (extended retention for enterprise)
      - name: Upload Evidence Pack
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-${{ github.sha }}
          path: |
            **/coverage/**
            **/test-results/**
            evidence-metrics.json
          retention-days: 90

  # Full build verification (runs on push to main only)
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: coverage
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (all packages)
        run: npx turbo run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: "**/dist/**"
          retention-days: 30
