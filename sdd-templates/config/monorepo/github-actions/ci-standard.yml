# Turborepo CI/CD - SDD Template Standard
# Generated by: stride init --scale standard
#
# Features:
# - Turborepo remote cache for fast builds
# - Differential execution (PR: affected only, main: full)
# - SDD stride-lint integration (outside Turborepo pipeline)
# - Evidence Pack artifact collection

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Required for diff detection

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Turborepo local cache
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # Differential execution: PR runs affected only, push runs all
      - name: Lint (affected only)
        run: npx turbo run lint --filter=...[HEAD~1]

      - name: Typecheck (affected only)
        run: npx turbo run typecheck --filter=...[HEAD~1]

      - name: Test (affected only)
        run: npx turbo run test --filter=...[HEAD~1]

      # Spec Drift Detection (contracts/ vs src/)
      - name: Spec Drift Check
        run: npx turbo run spec:drift || python3 sdd-templates/tools/spec_drift_detector.py . --json
        continue-on-error: true

      # SDD stride-lint (outside Turborepo pipeline)
      - name: SDD Spec Lint
        run: sdd-templates/bin/stride lint --all --warn-only

  # Coverage job (runs on main/develop push only)
  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Test with Coverage
        run: npx turbo run test:coverage

      - name: Contract Tests
        run: npx turbo run test:contract

      # Save Evidence Pack artifacts
      - name: Upload Evidence Pack
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-${{ github.sha }}
          path: |
            **/coverage/**
            **/test-results/**
          retention-days: 30
