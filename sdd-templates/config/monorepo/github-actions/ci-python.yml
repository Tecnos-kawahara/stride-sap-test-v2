# Python CI/CD - SDD Template
# For Python-based ERP addon projects (mcframe, SAP, etc.)
#
# Features:
# - pytest with SDD-compliant test paths
# - Coverage reporting with tier-based thresholds
# - SDD stride-lint integration
# - Spec Drift Detection (contracts/ vs src/)
# - Evidence Pack artifact collection

name: CI (Python)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r sdd-templates/requirements.txt

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/
        continue-on-error: true

      - name: Test
        run: pytest specs/*/tests/ -v --tb=short

      # Spec Drift Detection (contracts/ vs src/)
      - name: Spec Drift Check
        run: python3 sdd-templates/tools/spec_drift_detector.py . --json
        continue-on-error: true

      # SDD stride-lint (spec structure validation)
      - name: SDD Spec Lint
        run: sdd-templates/bin/stride lint --all --warn-only

  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r sdd-templates/requirements.txt

      - name: Test with Coverage
        run: pytest specs/*/tests/ --cov=src --cov-report=json:coverage/coverage-summary.json --cov-report=html:coverage/html

      # Evidence Metrics Collection
      - name: Collect Evidence Metrics
        run: python3 sdd-templates/tools/evidence_metrics_collector.py . --json > evidence-metrics.json
        continue-on-error: true

      - name: Upload Evidence Pack
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-${{ github.sha }}
          path: |
            coverage/
            **/test-results/**
            evidence-metrics.json
          retention-days: 30
