# ID Conventions Configuration
# Version: 5.3.3-tecnos-stride
#
# IMPORTANT: This file is a REFERENCE COPY for documentation and IDE support.
# The Single Source of Truth (SSoT) is memory/constitution.md#3.
# stride-lint reads patterns from constitution.md, NOT from this file.
# Do NOT rely on this file for validation - it may become stale.

version: "5.3.3-tecnos-stride"
source_of_truth: "memory/constitution.md#3"
note: "Reference only. Lint uses constitution.md directly."

id_conventions:
  # === Feature-level IDs ===
  feature_id:
    pattern: "^FEAT-(?:[A-Z]{2,4}-)?[A-Z0-9]{3,}$"
    example: "FEAT-001, FEAT-ORD-001"
    description: "Feature identifier (supports optional team prefix)"

  requirement_id:
    pattern: "^RQ-[0-9]{3}$"
    example: "RQ-001"
    description: "Business requirement"

  decision_id:
    pattern: "^DR-[0-9]{3}$"
    example: "DR-001"
    description: "Decision record"

  flow_id:
    pattern: "^FLOW-[0-9]{3}$"
    example: "FLOW-001"
    description: "Integration flow"

  use_case_id:
    pattern: "^US-FEAT[A-Z0-9]{3,}-[0-9]{3}$"
    example: "US-FEAT001-001"
    description: "Use case (belongs to a feature)"

  acceptance_id:
    pattern: "^AC-US-FEAT[A-Z0-9]{3,}-[0-9]{3}-[0-9]{2}$"
    example: "AC-US-FEAT001-001-01"
    description: "Acceptance criteria (belongs to a use case)"

  question_id:
    pattern: "^Q-[0-9]{3}$"
    example: "Q-001"
    description: "Open question"

  assumption_id:
    pattern: "^A-[0-9]{3}$"
    example: "A-001"
    description: "Assumption"

  phase_id:
    pattern: "^Phase-[0-9]+$"
    example: "Phase-1"
    description: "Phase identifier"

  group_id:
    pattern: "^G-[0-9]{2}-[a-z0-9-]+$"
    example: "G-01-contracts"
    description: "Task group"

  component_id:
    pattern: "^CMP-[0-9]{2}$"
    example: "CMP-01"
    description: "Component identifier"

  library_id:
    pattern: "^LIB-[0-9]{2}$"
    example: "LIB-01"
    description: "Library identifier"

  contract_id:
    pattern: "^CT-(API|CLI|EVT|FILE|BATCH|EDI|IDOC|DB)-[0-9]{2}$"
    example: "CT-API-01"
    description: "Contract identifier"

  test_id:
    pattern: "^TS-(CON|INT|E2E|UT)-[0-9]{2}$"
    example: "TS-INT-01"
    description: "Test identifier"

  database_schema_id:
    pattern: "^DB-FEAT-[A-Z0-9]{3,}$"
    example: "DB-FEAT-001"
    description: "Database schema identifier"

  task_id:
    pattern: "^T-[A-Z0-9]{2,}-[0-9]{3}$"
    example: "T-G01-001"
    description: "Task identifier"

  milestone_id:
    pattern: "^M-[0-9]{2}$"
    example: "M-01"
    description: "Milestone identifier"

  risk_id:
    pattern: "^R-[0-9]{3}$"
    example: "R-001"
    description: "Risk identifier"

  bpmn_process_id:
    pattern: "^BPMN-PROC-[A-Z0-9]{3,}$"
    example: "BPMN-PROC-001"
    description: "BPMN process ID"

  bpmn_element_id:
    pattern: "^BPMN-(TASK|GW|EVT|FLOW)-[0-9]{3}$"
    example: "BPMN-TASK-001"
    description: "BPMN element ID"

  # === Enterprise Extension IDs (v2.0.0) ===
  epic_id:
    pattern: "^EPIC-[A-Z]{3,}$"
    example: "EPIC-ORDER"
    description: "Epic identifier (multi-team initiative)"

  team_id:
    pattern: "^TEAM-[A-Z]{1,3}$"
    example: "TEAM-A, TEAM-ORD"
    description: "Team identifier"

  epic_milestone_id:
    pattern: "^EM-[0-9]{2}$"
    example: "EM-01"
    description: "Epic milestone identifier"

  integration_point_id:
    pattern: "^IP-[0-9]{3}$"
    example: "IP-001"
    description: "Integration point identifier"

  dependency_id:
    pattern: "^DEP-[0-9]{3}$"
    example: "DEP-001"
    description: "Cross-feature dependency identifier"

  shared_contract_id:
    pattern: "^SC-(API|EVT|FILE)-[A-Z0-9]{3,}$"
    example: "SC-API-ORDER"
    description: "Shared contract identifier"

  feature_breakdown_id:
    pattern: "^FBD-[A-Z0-9]{3,}$"
    example: "FBD-001"
    description: "Feature breakdown identifier"

  ccp_id:
    pattern: "^CCP-[0-9]{3}$"
    example: "CCP-001"
    description: "Contract Change Proposal identifier"

hierarchy:
  - level: 1
    id: feature_id
    children: [requirement_id, use_case_id, flow_id]
  - level: 2
    id: use_case_id
    children: [acceptance_id]
  - level: 2
    id: contract_id
    children: [test_id]
  - level: 3
    id: test_id
    children: [task_id]

validation:
  unique_within_scope: true
  hierarchical_naming: true
  placeholders:
    - "XXX"
    - "NNN"
    - "NN"
    - "TODO"
