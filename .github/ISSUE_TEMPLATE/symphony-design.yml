name: "Symphony: Design (Phase 1)"
description: "Phase 1 (Design) — basic_design.md + process.bpmn を自動生成"
labels: ["symphony:ready", "phase:design"]
body:
  - type: markdown
    attributes:
      value: |
        ## Symphony Task — Phase 1: Design
        基本設計（basic_design.md + process.bpmn）を自動生成します。
        仕様書 YAML がある場合は、Group / Feature の YAML パスを指定してください。

  - type: dropdown
    id: phase
    attributes:
      label: "Phase"
      description: "このテンプレートでは Design 固定です"
      options:
        - "design"
    validations:
      required: true

  - type: input
    id: feature_name
    attributes:
      label: "Feature Name"
      description: "specs/<feature_name>/ のディレクトリ名"
      placeholder: "e.g. edi_shipment_report_import"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "P0-Critical"
        - "P1-High"
        - "P2-Medium"
        - "P3-Low"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "要件・背景・スコープを記述してください。Issue 本文がエージェントへのプロンプトの一部になります。"
    validations:
      required: true

  - type: input
    id: group_spec_yaml_path
    attributes:
      label: "Group Spec YAML Path"
      description: "機能群仕様書 YAML のパス。未指定の場合は無視される。"
      placeholder: "e.g. docs/yaml/FG-SD005-003/FG-SD005-003.group.yaml"
    validations:
      required: false

  - type: input
    id: feature_spec_yaml_path
    attributes:
      label: "Feature Spec YAML Path"
      description: "個別機能仕様書 YAML のパス。未指定の場合は無視される。"
      placeholder: "e.g. docs/yaml/FG-SD005-003/features/FEAT-001__IF-IN-001.feature.yaml"
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria（任意）"
      description: "完了条件。SDD プロセスで自動生成されるため、通常は空でよい。"
    validations:
      required: false
