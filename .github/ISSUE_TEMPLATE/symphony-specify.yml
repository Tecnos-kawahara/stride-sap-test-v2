name: "Symphony: Specify (Phase 2)"
description: "Phase 2 (Specify) — spec.md + plan.md + contracts/ を自動生成"
labels: ["symphony:ready", "phase:specify"]
body:
  - type: markdown
    attributes:
      value: |
        ## Symphony Task — Phase 2: Specify
        詳細仕様（spec.md + plan.md + contracts/）を自動生成します。
        Phase 1 (Design) の Gate 1/2 が承認済みであることが前提です。

  - type: dropdown
    id: phase
    attributes:
      label: "Phase"
      description: "このテンプレートでは Specify 固定です"
      options:
        - "specify"
    validations:
      required: true

  - type: input
    id: feature_name
    attributes:
      label: "Feature Name"
      description: "specs/<feature_name>/ のディレクトリ名（Phase 1 で作成済みのもの）"
      placeholder: "e.g. edi_shipment_report_import"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "P0-Critical"
        - "P1-High"
        - "P2-Medium"
        - "P3-Low"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "追加の指示や制約があれば記述してください。"
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria（任意）"
      description: "完了条件。SDD プロセスで自動生成されるため、通常は空でよい。"
    validations:
      required: false
