name: SDD Lint

on:
  pull_request:
    paths:
      - "specs/**"
      - "sdd-templates/**"
      - "manual/**"
      - ".github/workflows/stride-lint.yml"
  push:
    branches:
      - main
    paths:
      - "specs/**"
  workflow_dispatch:

jobs:
  stride-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Check for specs
        id: check-specs
        run: |
          if [ -d "specs" ] && [ "$(ls -A specs 2>/dev/null)" ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "No specs directory found, skipping lint"
          fi

      - name: Check testreport integration
        if: steps.check-specs.outputs.has_specs == 'true'
        run: |
          if command -v testreport &> /dev/null; then
            for dir in specs/*/testreport; do
              [ -d "$dir" ] && testreport validate "$dir" || true
            done
          fi
        continue-on-error: true

      - name: Run stride-lint (warn-only)
        if: steps.check-specs.outputs.has_specs == 'true'
        run: |
          python3 sdd-templates/tools/stride_lint.py --all --warn-only --coverage-report 2>&1 | tee lint_output.txt
          # Extract coverage report if present
          if grep -q "coverage_report:" lint_output.txt; then
            grep -A 1000 "coverage_report:" lint_output.txt > coverage_report.yaml || true
          fi

      - name: Upload lint output
        if: steps.check-specs.outputs.has_specs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint_output.txt

      - name: Upload coverage report
        if: steps.check-specs.outputs.has_specs == 'true' && hashFiles('coverage_report.yaml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report.yaml
