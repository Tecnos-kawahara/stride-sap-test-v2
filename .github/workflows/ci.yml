# Starter CI - SDD Template Standard
# Generated by: stride init (scale: starter)
#
# Minimal CI for single-package monorepo.
# As your project grows, upgrade to standard/enterprise:
#   stride init <feature> --scale standard
#
# NOTE (fix/ci-quality-skip-node-when-no-lockfile):
#   The Node.js / Turborepo / npm steps below are conditional on the presence of
#   package-lock.json so that this workflow can also live unchanged in a Python /
#   YAML-only methodology repository (the Tecnos-STRIDE template repo itself has
#   no Node lockfile). Downstream projects that DO ship package-lock.json keep the
#   original behavior. The SDD stride-lint step always runs because it is the
#   primary quality gate for SDD artifacts.
#
# Security note: this workflow does not consume untrusted external inputs
# (PR title / issue body / comment body etc.). All run: commands use static
# strings or hashFiles() against repository-local files.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix script permissions
        run: chmod +x sdd-templates/bin/* sdd-templates/tools/stride-lint

      - name: Detect Node.js project
        id: detect_node
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js (when lockfile present)
        if: steps.detect_node.outputs.has_lockfile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps (when lockfile present)
        if: steps.detect_node.outputs.has_lockfile == 'true'
        run: npm ci

      - name: Build (when Node project)
        if: steps.detect_node.outputs.has_lockfile == 'true'
        run: npx turbo run build

      - name: Test (when Node project)
        if: steps.detect_node.outputs.has_lockfile == 'true'
        run: npx turbo run test

      # SDD stride-lint always runs (primary quality gate for SDD artifacts).
      - name: SDD Spec Lint
        run: bash sdd-templates/bin/stride lint --all --warn-only
